body:
  text: 欽定四庫全書論語集注通證卷上元張存中撰序説周禮牛人讀為樴義與杙同樴音特又餘式之式二反杙餘式反地官司徒上牛人掌養國之公牛以待國之政令凡祭祀共其享牛求牛以授職人而芻之享牛前祭一日之牛也求牛禱於鬼神祈求福之牛也職讀為樴樴謂之杙可以繫牛樴人者謂牧人充人與芻牲之芻牛人擇於公牛之中而以授養之魯世家以此以上皆為十二年事史記十二年使子路毁三桓城收其甲兵孟氏不肯墮城墮毁也隳同伐之不克而止季桓子受齊女樂孔子去史記以論語歸與之歎為在此時孔子世家季康子於是使使召冉求冉求將行孔子曰魯人召求非小用之將大用之也是日孔子曰歸乎歸乎吾黨之小子狂簡斐然成章吾不知所以裁之史記云書社地七百里孔子世家孔子使子貢至楚楚昭王興師迎孔子然後得免昭王將以書社地七百里封孔子索隱曰古者二十五家為里里則各立社則書社者書其社之人名於籍蓋以七百里書社之人封孔子也故冉求云雖纍千社而夫子不利是也饒氏曰書社猶今人所謂書會也蓋卿大夫所當得底地謂之采地如這箇却是君之所特與故謂之書社地言以此養其徒也便如齊王欲中國授孟子室養弟子以萬鍾相似弟子顔子最賢蚤死後唯曽子得傳孔子之道史記仲尼弟子列傳顔回者魯人也字子淵少孔子三十歲年二十九髮盡白蚤死按家語亦云年二十九而髮白三十二早死孔子曰自吾有回門人日益以德行著名孔子稱其仁焉孔子哭之慟曰自吾有回門人益親家語弟子解曽參南武城人字子與史記字子與少孔子四十六歲志存孝道故孔子因之以作孝經史記云孔子以為能通孝道故授之業作孝經韓文原道惟孟子師子思子思之學出於曽子自孔子沒獨孟子之傳得其宗詳見孟子序説學而篇學而時習章坐如尸立如齊側皆反曲禮上坐如尸視貌正立如齊磬耳聽不見是而無悶乾卦文言道千乘之國章節以制度不傷財不害民節卦彖辭禮之用章禮勝則離樂勝則流禮樂記樂勝則流禮勝則離合情飾貌者禮樂之事也富而好禮章安處善樂循理董仲舒策孔子曰天地之性人為貴明於天性知自貴於物知自貴於物然後知仁義知仁義然後重禮節重禮節然後安處善安處善然後樂循理樂循理然後謂之君子子貢貨殖家語子貢家富纍千金好販與時轉貨買賤賣貴以殖其貨為政篇為政以德章北極天之樞也晉天文志天體如鳥卵天包地外地居其中猶卵之裹黃天半覆地上半在地下見隱各一百八十二度強北極出地上三十六度南極入地下亦三十六度嵩髙正當天之中極南五十五度當嵩髙之上南北極持其兩端天與日月星辰皆斜而回轉熊氏曰北極當地上常見不隱經星隨天左旋日月五緯右轉更迭隱見皆若環繞而歸向之也詩三百章魯頌駉篇之辭卒章駉駉牡馬在坰之野薄言駉者有駰音因有騢音遐有驔音簟有魚以車袪袪起居反思無邪思馬斯徂經禮三百曲禮三千亦可以一言蔽之曰毋不敬禮器禮有大有小有顯有微大者不可損小者不可益顯者不可掩微者不可大也故經禮三百曲禮三千其致一也經禮儀禮也如士諸侯冠禮之類此是大節有三百條曲禮禮記也如冠禮始加再加三加坐如尸之類此是小目有三千餘條曲禮上毋不敬毋者禁止之辭敬者主一無適之謂言毋得不敬也此一句乃禮書綱領也吾十有五章聲為律身為度史記夏紀禹為人敏給克勤其德不違其仁可親其言可信聲為律身為度色難章孝子之有深愛者六云禮祭義子奚不為政章孔子不仕故或人疑其不為政也史記孔子世家定公立五年魯自大夫以下皆僭離於正道故孔子不仕退而修詩書禮樂弟子彌衆至自逺方莫不受業焉子張問十世章三統謂夏正建寅為人統商正建丑為地統周正建子為天統前漢律歷志天統之正始於子半日萌色赤地統受之於丑初日肇化而黃至丑半日芽化而白人統受之於寅初曰孽成而黑至寅半曰生成而青禮檀弓夏后氏尚黑殷人尚白周人尚赤疏曰夏正物之始生其色尚黑以寅為朔殷正物之芽其色尚白以雞鳴為朔周正其色尚赤以夜半為朔鄭康成以為自古皆改正朔孔安國曰湯承堯舜禪代之後革命朔制是湯始改朔八佾篇季氏八佾舞於庭章天子八諸侯六大夫四士二左傳隱公五年九月考仲子之宫將萬焉公問羽數於衆音終仲對曰天子用八諸侯用六大夫用四士二夫平聲舞所以節八音而行八風故自八以下公從之杜預曰人如佾數服虔曰每佾八人林放問禮之本章禮始諸飲食故汙尊而抔飲禮運夫禮之初始諸飲食其燔黍捭音擘豚汙音蛙尊而抔步侯反飲蕢苦怪反桴而土鼓猶若可以致其敬於鬼神古未有釡甑釋米捭肉加於燒石之上而食之耳汙尊鑿地為尊也抔飲丰掬之也蕢讀為由堛也謂搏土為桴也土鼓築土為鼓也徑情而直行禮檀弓下子遊曰禮有微情者節哭踊有以故興物者棄絰之制有直情而徑行者戎狄之道也哭踊無節衣服無制季氏旅於泰山章禮諸侯祭封內山川王制天子祭天地諸侯祭社稷大夫祭五祀天子祭天下名山大川五嶽視三公四瀆視諸侯視者視其牲器之數諸侯祭名山大川之在其地者魯人祭泰山晉人祭河是也巧笑倩兮章考工記曰繪畫之事後素功周禮冬官考工記上畫繢之事青與赤謂之文赤與白謂之章白與黑謂之黼黑與青謂之黻五采備謂之繡凡畫繢之事後素功甘受和白受采忠信之人可以學禮禮禮器君子曰甘受和白受采忠信之人可以學禮苟無忠信之人則禮不虛道道猶行也禘自既灌而往者章禘王者之大祭也禮喪服小記王者禘其祖之所自出以其祖配之禘大祭也始祖感天神靈而生祭天則以祖配之大傳禮不王不禘王者禘其祖之所自出以其祖配之成王以周公有大勳勞賜魯重祭禮明堂位昔殷紂亂天下脯鬼侯以饗諸侯以人肉為薦羞惡之甚也是以周公相武王以伐紂武王崩成王幼弱周公踐天子之位以治天下六年朝諸侯於明堂制禮作樂頒度量而天下大服度謂丈尺量謂豆區斗斛筐筥七年致政於成王成王以周公為有勳勞於天下是以封周公於曲阜地方七百里革車千乘曲阜魯地革車兵車也命魯公世世祀周公以天子之禮樂祭統昔者周公有勳勞於天下周公既沒成王康王追念周公之所以勳勞者而欲尊魯故賜之以重祭外祭則郊社是也內祭則大嘗禘是也夫大嘗禘升歌清廟下而管象朱干玉戚以舞大武八佾以舞大夏此天子之樂也康周公故以賜魯也夫子嘗曰我欲觀夏道又曰我欲觀周道禮禮運孔子曰我欲觀夏道是故之杞而不足徴也吾得夏時焉得夏四時之書也其書存者有夏小正我欲觀殷道是故之宋而不足徴也吾得坤乾焉得殷隂陽之書也其書存者有歸藏坤乾之義夏時之等吾以是觀之孔子曰嗚呼哀哉我觀周道幽厲傷之吾舍魯何適矣魯之郊禘非禮也周公其衰矣祭如在章七日戒三日齊必見所祭者禮坊記子云七日戒三日齊側皆反承一人焉戒謂散齊也承猶事也祭義致齊於內散齊於外齊之日思其居處思其笑語思其志意思其所樂思其所嗜齊三日乃見其所為齊者致齊思此五者也散齊七日不御不樂不弔其見所為齊者思之熟也所嗜素所欲飲食也春秋傳曰屈到耆芰祭之日僾音愛然必有見乎其位周還音旋出户肅然必有聞乎其容聲出户而聽愾音慨然必有聞乎其歎息之聲寧媚於竈章竈五祀之一禮月令孟春之月其祀户祭先脾孟夏之月其祀竈祭先肺中央土其祀中霤祭先心孟秋之月其祀門祭先肝孟冬之月其祀行祭先腎子入大廟章魯周公廟公羊傳文公十三年周公稱大廟魯公稱世室羣公稱宫周公何以稱大廟于魯封魯以為周公也周公拜乎前魯公拜乎後始受封時拜于文王廟也曰生以養周公死以為周公主射不主皮章記曰武王克商樂記武王克殷反商濟河而西散軍而郊射散軍則不廢農事郊射則不忘武備射宫在郊故曰郊射左射貍首右射騶虞而貫革之射息也貫革者射穿甲革所以主皮也以樂為節則無事乎貫革矣子貢欲去告朔之餼羊章季冬頒來歲十二月之朔周禮春官大史正歲年以序事頒之于官府及都鄙頒告朔于邦國天子頒朔于諸侯諸侯藏之祖廟至朔朝于廟告而受行之鄭司農云頒讀為班班布也以十二月朔布告天下諸侯特羊告廟禮玉藻天子玄端而朝日於東門之外聽朔於南門之外閏月則闔門左扉立于其中端當為冕字之誤也凡聽朔必以特牲告其帝及神配以文王武王疏曰天子告朔以特牛諸侯告朔以羊其朝享各依四時常禮故用太牢魯自文公始不視朔春秋文公六年閏月不告月猶朝于廟左傳閏月不告朔非禮也閏以正時時以作事事以厚生生民之道於是乎在矣不告閏朔棄時政也何以為民公羊文公十六年夏五月公四不視朔公曷為四不視朔公有疾也何言乎公有疾不視朔自是公無疾不視朔然則曷為不言公有疾不視朔有疾猶可言也無疾不可言也管仲之器小哉章三歸臺名事見説苑劉向説苑善説篇齊桓公立仲父致大夫曰善吾者入門而右不善吾者入門而左有中門而立者桓公問焉對曰管子之知可與謀天下其強可與取天下君恃其信乎內政委焉外事斷焉民而歸之是亦可奪也桓公曰善乃謂管仲政則卒歸於子矣政之所不及唯子是匡管仲故築三歸之臺以自傷於民仲乃乙娶三姓而備九女故築三歸之臺觀以處之是自傷於民力也揚雄所謂大器揚子先知篇或曰齊得夷吾而霸仲尼曰小器請問大器大器其猶規矩準繩乎先自治而後治人之謂大器規矩先自方圓然後能使物方圎準繩先自平直然後能使物平直此之謂大器管子不知禮豈足以為大器哉桓公內嬖六人左傳僖公十七年齊侯之夫人三王姬徐嬴蔡姬皆無子齊侯好內內女色也多內寵內嬖如夫人者六人長衛姬生武孟有衛姬二故長少别之武孟即公子無虧少衛姬生惠公惠公即公子元鄭姬生孝公孝公即公子昭葛嬴生昭公昭公即公子潘密姬生懿公懿公即公子商宋華子生公子雍宋華氏子姓之女生公子雍何患於喪乎章喪欲速貧見滕文公上里仁篇觀過斯知仁矣章後漢吳祐謂掾以親故受汙辱之名吳祐傳祐字季英陳留長垣人順帝時以光祿四行遷膠東侯相四行謂敦厚質朴遜讓節儉也祐政唯仁簡以身率物吏人懷而不欺嗇夫孫性私賦民錢市衣以進其父嗇夫小吏也執役之賤職者姓孫名性為嗇夫私斂民錢五百市買單衣以進與父父得而怒曰有君如是何忍欺促歸伏罪促迫性令往祐所出受私賦之罪性慙懼詣閣持衣自首性慙恧恐懼遵父命持單衣詣祐閣下伏罪出首祐屛音丙左右問其故性具談父言祐曰掾以親故受汙穢之名所謂觀過斯知仁矣使歸謝父還以衣遺去聲之使性歸家謝父教命仍以所市衣違其父憐其孝也無適也章春秋傳曰吾誰適從左傳僖公五年晉侯使士蒍音委為去聲二公子築蒲與屈士蒍退而賦曰狐裘厖音蒙茸音戎以狐腋為裘貴者之裘也厖茸亂貌言貴者之多一國三公蒲屈大都耦國故獻公與二公子鼎立為三公吾誰適從言城不堅則為公子所訴堅之則為固仇不忠無以事君故不知所適從事父母幾諫章與內則之言相表裏禮內則父母有過下氣怡色柔聲以諫諫若不入起敬起孝説音恱則復諫不説與其得罪於鄉黨州閭寧孰諫父母怒不説而撻之流血不敢疾怨起敬起孝公冶篇孟武伯問子路仁乎章謂悉索音色敝賦是也左傳襄公八年鄭乃及楚平使王子伯駢告于晉曰君命敝邑修而車賦修治而汝賦兵也警而師徒警戒師旅徒衆也以討亂略蔡人不從敝邑之人不敢寧處悉索敝賦索盡也悉盡敝邑之兵賦以討于蔡獲司馬燮獻于邢丘襄公三十一年十月子産相鄭伯如晉子産使盡壞其館之垣而納車馬焉士文伯讓之對曰以敝邑褊必淺反小介於大國介間也誅求無時誅責也是以不敢寧居悉索敝賦以來會時事孔文子何以謂之文也章孔文子使太叔疾出其妻而妻之左傳哀公十一年冬衛太叔疾出奔宋太叔疾即太叔齊初疾娶于宋子朝子朝宋人衛大夫其娣嬖子朝出孔文子使疾出其妻出宋朝之女而妻之疾使侍人誘其初妻之娣置於犂犂衛邑而為之一宫如二妻文子怒欲攻之仲尼止之遂奪其妻孔文子遂奪其女不嫁太叔疾或淫于外州外州人奪之軒以獻外州人奪太叔疾之軒車以獻於君恥是二者太叔疾以奪妻奪軒二事為耻故出衛人立遺遺疾之弟使室孔姞其一反孔姞即孔文子之女疾之妻也使太叔遺室之孔文子之將攻太叔也訪於仲尼仲尼曰胡簋之事胡簋禮器名夏曰胡周曰簋則嘗學之矣甲兵之事未之聞也退命駕而行諡法有以勤學好問為文非經天緯地之文史記諡法解惟周公太公嗣王業建功于牧野終將葬乃制諡遂敘諡法諡者行之迹號者功之表古者有大功則賜之善號以為稱也車服者位之章也是以大行受大名細行受細名行出於己名生於人名謂號諡經緯天地文經緯天地相錯而成如織之成文也道德博聞文勤學好問文慈惠愛民文愍民惠禮文錫民爵位文公叔文子之文錫民爵位之文順理而成章之謂子産有君子之道四焉章如都鄙有章上下有服左傳襄公三十年鄭子皮授子産政子産使都鄙有章上下有服田有封洫廬井有伍大人之忠儉者從而與之泰侈者因而斃之從政一年輿人誦之曰取我衣冠而褚之褚畜也奢侈者畏法故畜藏取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之殖生也子産而死誰其嗣之嗣續也臧文仲章不仁者三不知者三是也左傳文公三年秋八月丁卯大事于太廟躋僖公逆祀也僖是閔兄不得為父子嘗為臣位應在下令居閔上故曰逆祀仲尼曰臧文仲其不仁者三不知者三下展禽展禽栁下惠也文仲知桞下惠之賢而使在下位不與立於朝也非己欲立而立人之道廢六關塞關陽關之屬凡六關所以禁絶來逰而廢之妾織蒲以蒲為席是與民爭利也三不仁也作虛器謂居蔡之室而山節藻梲也有其器無其位故曰虛縱逆祀聽夏父弗忌躋僖公祀爰居三不知也按家語顔回篇曰置六關王肅云六關關名魯本無此關文仲置之以稅行客故為不仁傳曰廢六關未知孰是姑并録之臧文仲居蔡章祀爰居之義國語魯語海鳥曰爰居海鳥似鳯大如馬駒一名雜縣海有大風冬暖之災來辟之止於魯東門之外三日魯國東門外栖止凡三日臧文仲使國人祭之文仲以為神命人祭之非國典也難以為仁且智令尹子文三仕為令尹章子文姓鬬名穀於莵左傳宣公四年秋七月戊戌楚子與若敖氏戰于臯滸音虎臯滸楚地遂滅若敖氏越椒戰敗而死莊王遂滅其族初若敖娶於鄖音云又作鄖若敖楚之入世祖娶鄖國之女生鬭伯比若敖卒從其母畜音蓄於鄖淫於鄖子之女伯比私淫於鄖子之女生子文焉鄖夫人使棄諸夢音蒙又如字中鄖女之母夫人知之使棄所生之子於夢澤之中虎乳之鄖子田見之懼而歸夫人以告言其女私通伯比所生遂使收之楚人謂乳穀奴口反謂虎於莵音烏徒故命之曰鬭穀於莵以其女妻去聲伯比實為令尹子文鬭氏始自子文為令尹崔子弒齊君春秋襄公二十五年夏五月乙亥齊崔杼弒其君光左傳齊棠公之妻東郭偃之姊也棠公齊棠邑大夫東郭偃臣崔武子棠公死偃御武子以弔焉見棠薑而美之遂取之莊公通焉驟如崔氏以崔子之冠賜人侍者曰不可公曰不為崔子其無冠乎言雖不為崔子猶自應有冠崔子因是又以其間去聲伐晉也間晉之難而伐之曰晉必將報欲弒公以説于晉而不獲間公鞭侍人賈舉而又近之乃為崔子間公伺公間隙五月莒子朝子齊甲戌饗諸北郭崔子稱疾不視事欲使公來乙亥公問崔子問疾遂從薑氏薑入于室與崔子自側户出公拊楹而歌歌以命薑侍人賈舉止衆從者而入閉門甲興公登臺而請弗許請盟弗許請自刃於廟弗許皆曰君之臣杼疾病不能聽命近於公宫謂崔子宫近公宫或淫者詐稱公陪臣干胡旦反掫將侯反有淫者不知二命干掫行夜言行夜得淫人受崔子命討之不知他命夜戒有所擊也公踰牆又射之中股反隊與墜同遂弒之子文之相楚所謀者無非僭王猾夏之事左傳莊公三十年楚殺令尹子元以鬭穀於莵為令尹僖公二十三年楚成得臣伐陳取焦夷子文以為功使子玉為令尹子文為令尹凡二十八年杜氏曰按莊公三十年楚成王立九年矣僖公二十三年即成王之三十六年也楚自武王三十七年僭稱王魯桓公之八年也武王五十一年卒子文王立文王十三年卒子堵敖立堵敖五年卒弟成王立僖公元年楚成王之十四年也楚伐鄭鄭即齊故也五年楚鬬穀於莵滅弦六年楚子圍許許男靣縛銜璧乃釋之十二年楚人滅黃十五年楚人伐隨二十年隨以漢東諸侯叛楚楚鬬穀於莵帥師伐隨取成而還二十一年宋人為鹿上之盟以求諸侯於楚楚人許之諸侯會宋公于盂楚執宋公以伐宋已而釋之二十二年楚人伐宋宋公及楚人戰于泓宋師敗績公傷股明年宋襄公死二十三年楚師伐陳討其二於宋也此僭王猾夏之事也又不數歲而復反於齊焉左傳襄公二十七年宋向戍欲弭諸侯之兵以為名欲獲息民之名如晉告趙孟晉人許之如楚楚亦許之如齊齊人難之陳文子曰晉楚許之我焉得已且人曰弭兵而我弗許則固擕吾民矣將焉用之齊人許之杜氏曰按襄公二十五年崔杼弒齊君是時陳文子出奔二十六年不經見至二十七年文子有弭兵之説則文子自出奔復反於齊凡二年三思而後行章使晉而求遭喪之禮以行左傳文公六年秋季文子將聘于晉使求遭喪之禮以行其人曰將焉音煙用之文子曰備豫不虞古之善教也求而無之實難過求何害過求不用何害於事此所謂季文子三思而後行也宣公篡立文子不能討反為使齊而納賂焉左傳文公十八年二月公薨文公二妃敬嬴生宣公敬嬴嬖而私事襄仲宣公長而屬諸襄仲襄仲欲立之叔仲不可叔仲惠伯仲見于齊侯而請之齊侯新立而欲親魯許之冬十月仲殺惡及視而立宣公惡太子視其母弟殺視不書賤之也宣公元年夏季文子如齊納賂以請會宣公篡立未列於會故以賂請之會于平州平州齊地在太山牟縣西以定公位篡立者諸侯既與之會則不得討臣子殺之與弒君同故公與齊會而位定寧武子其知可及也其愚不可及也章成公無道至於失國而武子周旋其間盡心竭力不避艱險左傳僖公二十八年衛侯聞楚師敗楚成王與晉文公戰于城濮衛地也楚師敗績衛成公聞之懼出奔楚初晉侯將伐曹假道于衛衛弗許晉伐衛衛侯請盟晉人弗許衛侯欲與楚國人不欲故出其君以説于晉衛侯聞楚敗出居襄牛之地以避晉而遂奔楚遂適陳使元咺奉叔武以受盟元咺衛大夫叔武衛侯弟奉叔武使攝君事以受盟于踐土癸亥王子虎盟諸侯于王庭或訴元咺於衛侯曰立叔武矣其子角從公公使殺之咺不廢命奉夷叔以入守音狩夷叔即武叔六月晉人復衛侯寧武子與衛人盟于宛濮寧武子寧俞也時從衛侯在外故與衛人盟于宛濮之地曰載書曰天禍衛國君臣不協以及此憂也今天誘其衷使皆降心以相從也不有居者誰守社稷不有行者誰捍牧圉不協之故用昭乞盟于爾大神以誘天衷自今日以往既盟之後行者無保其力居者無懼其罪有渝此盟以相及也明神先君是糾是殛國人聞此盟也而後不二衛侯先期入寧子先寧武子患公之欲速故先入欲安喻國人長牂音贓守門以為使去聲也與之乘去聲而入長牂與寧子共載而入國公子歂市專也犬華去聲仲前驅衛侯遂驅掩寧子未備二子並衛大夫叔武將沐聞君至喜捉髮走出前驅射而殺之公知其無罪也枕去聲之股而哭之歂犬走出公使殺之元咺出奔晉冬會于溫討不服也衛侯與元咺訟寧武子為輔針音鉗莊子為坐坐獄為主士榮為大士大士治獄官也周禮命夫命婦不躬坐獄訟元咺又不宜與君對坐故使針莊子為坐又使衛之忠臣及其獄官質正元咺傳曰王叔之宰與伯輿之大夫坐獄於王庭各不身親蓋今勘吏有罪先驗吏卒之義衛侯不勝三子辭屈故不勝殺士榮刖音月針莊子謂寧俞忠而免之執衛侯歸之于京師置諸深室寧子職納槖音託饘音旃焉寧俞以君在幽隘故親以衣食為己職槖衣囊饘糜也言其忠至所慮者深元咺歸于衛衛侯既執故元咺得歸于衛立公子瑕瑕衛公子適也元咺立之以為君僖公三十年夏晉侯使醫衍鴆音鴆衛侯衍醫名晉文實怨衛侯欲殺之而罪不及死故使醫因治疾而加鴆毒寧俞貨醫寧武子視衛侯衣食得知其謀乃以貨賄納賂于醫使薄其鴆不死公為去聲之請魯僖公與衛同好故為之請納玉於王與晉侯皆十瑴與玨同二玉相合曰瑴襄王與晉侯皆玉十玨王許之襄王許之秋乃釋衛侯論語記寧武子此其愚不可及也杜氏曰按左氏僖公二十五年衛文公卒子成公立僖二十六年即衛成公元年也經稱公會衛寧速盟于向速寧莊子則莊子逮事成公矣至僖公二十八年傳稱寧武子與衛人盟於宛濮名俞速子即成公即位之三年也以此考之寧莊子當死于成公二年左右而子俞為大夫則武子未嘗事文公而集注謂武子仕衛當文公成公之時與此少異盍各言爾志章易曰勞而不伐是也繫辭上子曰勞而不伐有功而不德厚之至也伯夷叔齊孤竹君之二子見下泰伯篇雍也篇雍也可使南面章莊周所稱子桑户者莊子大宗師篇子桑户孟子反子琴張三人相與友伯子不衣冠而處夫子譏其欲同人道於牛馬劉向説苑修文篇孔子見子桑伯子伯子魯人子桑户也子桑伯子不衣冠而處弟子曰夫子何為見此人乎曰其質美而無文吾欲説而文之説音稅下同孔子去子桑伯子門人不説曰何為見孔子乎曰其質美而文繁吾欲説而去其文故曰文質修者謂之君子有質而無文謂之易野易簡易野鄙野也子桑伯子易野欲同人道於牛馬故仲弓曰大簡哀公問弟子孰為好學章若舜之誅四凶書舜典流共工窮竒于幽州放歡兜渾敦于崇山竄三苗叨餮于三危殛鯀檮杌于羽山四罪而天下咸服伯牛有疾章禮病者居北牖下君視之則遷於南牖下喪大記疾病外內皆掃君大夫徹縣音玄士去琴瑟寢東首於北牖下疏曰病者雖恆在北牖下若君來視之時則暫時移向南牖下東首令君得南面而視之子遊為武城宰章如飲射讀法之類周禮地官黨正春秋祭禜音榮五百家為一黨其正於春秋二時禜祭日月星辰水旱之類國索鬼神而祭祀歲十二月大蠟之時索鬼神萬物而則以禮屬民而飲酒于序祭之序學名合聚其黨之民而行鄉飲以正齒位一命齒于鄉里之禮于序一命為下士以再命齒于父族年與衆賔相次再命為中士則以年與族人相次而衆賔不敢與之齒矣三命而不齒三命為上士則雖父族亦不得而齒焉故席于尊東鄉大夫以鄉射之禮五物詢衆庶物猶事也謀於衆庶復求賢能養于鄉學以補所興之缺一曰和發而中節二曰容動皆合禮三曰主皮不失正鵠四曰和容容體比於和五曰興舞節比於樂州長春秋以禮會民而射于州序解同上州長各掌其州之教治政令之法有教則有治政令則所以輔教治者法則其條目也正月之吉各屬音祝下同其州之民而讀法屬猶合也聚合其州之民讀教法而示之黨正四時之孟月吉日則屬民而讀邦法如州長之禮三月在州三時在黨族師各掌其族之戒令政事百家為族戒以敕其怠忽令所以輔戒而政事則次之月吉則屬民而讀邦法屬民讀法州長以正月黨正以孟月族師則每月舉得閭胥各掌其閭之徵令二十五家為閭其胥掌其徴召之命令以歲時各數其閭之衆寡辨其施舍既比必二反則讀法既比人數之後則讀法以戒數之孟之反不伐章事在哀公十一年左傳哀公十一年齊國書髙無丕與丕同帥師伐我孟孺子泄帥右師孺子孟懿子之子武伯彘也冉求帥左師師及齊師戰于郊右師奔齊人從之逐右師孟之側後入以為殿之側孟氏族也字反抽矢策其馬曰馬不進也子見南子章孔子至衛南子請見史記孔子世家孔子適衛靈公夫人有南子者使人謂孔子曰四方之君子不辱欲與寡君為弟兄者必見寡小君寡小君願見孔子辭謝不得已而見之夫人在絺帷中孔子入門北面稽首夫人自帷中再拜環佩玉聲璆然孔子曰吾鄉音向為弗見見之禮答焉子路不説音恱孔子矢之曰子所不浮九反者天厭之天厭之居衛月餘靈公與夫人同車宦者雍渠參乘出使孔子為次乘招搖市過之招搖翺翔也孔子曰吾未見好去聲下同德如好色者也於是醜之去衛有見其小君之禮春秋莊公二十四年八月丁丑夫人薑氏入戊寅大夫宗婦覿用幣哀薑齊襄公之女也宗婦同姓大夫之婦禮小君至大夫執贄以見明臣子之道莊公欲奢誇夫人故使大夫宗婦同贄俱見如云所不與崔慶者之類左傳襄公二十五年齊崔杼名弒莊公立景公而相之慶封為左相盟國人於大音太宫曰所不與崔慶者晏子仰天歎曰嬰所不唯忠於君利社稷是與有如上帝乃歃盟書云所不與崔慶者有如上帝讀書未終晏子抄答易其辭因自歃述而篇述而不作章老彭商賢大夫見大戴禮虞德篇有商老彭之語薛氏曰老彭殷賢大夫即莊子所謂彭祖也名鏗堯臣封於彭城歷虞夏至商年七百歲故以久夀見世本云姓籛名鏗在商為守藏史在周為柱下史年八百歲自行束修以上章相見必執贄以為禮禮曲禮下凡摯天子鬯諸侯圭卿羔大夫雁士雉庶人之摯匹音木童子委摯而退摯之言至也童子委摯而退不與成人為禮也匹鶩也野外軍中無摯以纓拾矢可也纓馬繁纓也拾為射韝婦人之摯椇榛脯修棗栗子之所慎章齊之為言齊也禮祭統及時將祭君子乃齊齊側皆反之為言齊如字下同也齊不齊以致齊者也子在齊聞韶章史記三月上有學之二字孔子世家魯亂孔子適齊為髙昭子家臣欲以通乎景公與齊大師語樂聞韶音學之三月不知肉味齊人稱之夫子為衛君乎章伯夷叔齊遜國而逃諫伐而餓史記伯夷叔齊傳伯夷叔齊孤竹君之二子也索隱曰孤竹君是殷湯所封相傳至夷齊之父名初字子朝伯夷名元字公信叔齊名致字公逹夷齊諡也伯仲又其長少之字也地理志孤竹城在遼西今支縣應劭云蓋伯夷之國君姓墨胎氏正義曰姓點氏括地志云孤竹古城在盧龍縣南十二里殷時諸侯孤竹國也武王載木主號為文王東伐紂伯夷叔齊叩馬而諫曰父死不葬爰及干戈可謂孝乎以臣弒君可謂仁乎左右欲兵之兵殺之也太公曰武王田子渭得吕尚父謂曰吾太公望子久矣號曰太公望此義人也扶而去之武王已平殷亂天下宗周而伯夷叔齊耻之義不食周粟謂不食周祿也隱於首陽山首陽山即雷首山之陽在河東府河東縣南采薇而食之遂餓而死加我數年章史記作假我數年若是我於易則彬彬矣孔子世家孔子晚而喜易序彖繫象説卦文言讀易韋編三絶曰假我數年若是我於易則彬彬矣不知老之將至云爾章俯焉曰有孳孳而不知年數之不足禮表記小雅曰髙山仰止景行行止子曰詩之好仁如此鄉道而行中道而廢忘身之老也不知年數之不足也俯焉日有孳孳斃而後已陳司敗問昭公知禮乎章不娶同姓謂吳孟子者禮坊記取去聲妻不取同姓以厚别也厚猶逺也故買妾不知其姓則卜之以此坊民魯春秋猶去夫人之姓曰吳其死曰孟子卒魯昭公娶於吳吳亦姬姓故諱曰吳孟子者假托以為子姓也子路請禱章士喪禮疾病行禱五祀儀禮士喪禮記士處適寢寢東首于北牖下有疾病者齊音劑憂也正情性也適寢者不齊不居其室養者皆齊徹琴瑟疾病外內皆掃徹褻衣加新衣御者四人皆坐持體為不能自轉側御者今時侍從之人男女改服屬纊以俟絶氣纊今之新綿易搖動置口鼻之上以為候男子不絶於婦人之手婦人不絶於男子之手乃行禱于五祀謂門户竈行中霤盡孝子之情五祀博言之士二祀曰門曰行乃卒泰伯篇泰伯其可謂至德也已矣章泰伯不從事見春秋傳吳越春秋古公三子古公周大王之本號也後乃尊為大王名亶父公劉九世孫也有三子長曰太伯次曰仲雍一名虞仲仲雍字孰哉少曰季歷季歷娶大任列女傳曰大薑有台氏之女大任摯任氏之中女王季之妃文王之母也生子昌有聖瑞尚書帝命驗云季秋之月甲子赤爵御丹書入于鄷止于昌户其書云敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶凡事不強則不枉不敬則不正枉者廢滅敬者萬世以仁得之以仁守之其量百世以不仁得之以仁守之其量十世以不仁得之不仁守之不及其世此蓋聖瑞古公知昌聖欲傳國以及昌意欲傳國于季歷以及于昌曰興王業者其在昌乎因名曰季歷太伯仲雍望風知指言二子知其意曰歷者適也知古公欲以國及昌古公病二人託名採藥于衡山太伯仲雍托與大王採藥治病於衡山而讓國遂之荆蠻荆者楚之舊號以州而言曰荆蠻者閲地南夷之名也正義曰太伯奔吳所居城在蘇州北五十里常州無錫縣界梅里村其城及冡兄存而云亡荆蠻者楚滅越其地屬楚秦滅楚其地屬秦秦諱楚故曰荆故通號吳越之地為荆及北人史加云蠻勢之然也斷髮文身俗常在水中故斷其髮文其身以象龍子故不見傷害為夷狄之服示不可用古公卒太伯仲雍歸赴喪畢還荆蠻國民而君事之自號為勾吳吳言勾者夷之發聲猶言於越耳吳名始於太伯明以前未有吳號地在越楚之界故稱荆蠻也吳人或問何像為勾吳太伯曰吾以伯長居國絶嗣者也其當有封者吳仲也故自號勾吳非其方乎荆蠻義之從而歸之者千有餘家共立以為勾吳數年之間民人殷富遭殷之末世衰中國侯王數用兵恐及於荆蠻故太伯起城周三里二百步外郭三百餘里在西北隅名曰故吳人民皆耕田其中古公病將卒令季歷讓國於太伯而三讓不受故云太伯三以天下讓左傳僖公五年宫之竒曰太伯虞仲太王之昭也太伯不從是以不嗣杜預曰不從父命俱讓適吳仲雍支子别封西吳虞公其後也曽子有疾章君子曰終小人曰死禮檀弓上君子曰終小人曰死吾今日其庶幾乎父母全而生之子全而歸之禮祭義樂正子春下堂而傷其足數月不出猶有憂色門弟子曰夫子之足瘳矣數月不出猶有憂色何也樂正子春曰善如爾之問也善如爾之問也吾聞諸曽子曽子聞諸夫子曰天之所生地之所養無人為大父母全而生之子全而歸之可謂孝矣不虧其體不辱其身可謂全矣故君子頃步而弗敢忘孝也今豫忘孝之道豫是以有憂色也頃當為跬聲之誤也大蘃反立於禮章固人肌膚之會筋骸之束見大學或問民可使由之章朝四暮三之術列子黃帝篇宋有狙公者善養猿猴之人故號曰狙公愛狙養之成羣能解狙之意狙亦得公之心損其家口充狙之欲俄而匱焉將限其食恐衆狙之不馴於己也先誑之曰與若芧芧栗也一云橡子也芋音序朝三而暮四足乎衆狙皆起而怒俄而曰與若芧朝四而暮三足乎衆狙皆伏而喜物之以能鄙相籠皆猶此也子罕篇拜下禮也章臣與君行禮當拜於堂下儀禮燕禮為君燕卿大夫之禮公坐取大夫所酳觶興以酬賔降西階下再拜稽首公命小臣辭賔升成拜升成拜復再拜稽首也子畏於匡章陽虎曽暴於匡史記孔子世家孔子去衛將適陳過匡顔刻為僕以其策指之曰昔吾入此由彼缺也匡人聞之以為魯之陽虎陽虎嘗暴匡人匡人於是遂止孔子孔子狀類陽虎拘焉五曰顔淵後子曰吾以汝為死矣顔淵曰子在回何敢死匡人拘孔子益急弟子懼孔子曰文王既沒文不在兹乎天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如子何孔子使從者為寧武子臣於衛然後得去索隱曰家語子路彈劔而歌孔子和之曲三終匡人解圍而去今此取論語文王既沒之文及從者臣寧武子然後得去蓋夫子再厄匡人或説辭以解圍或彈劔而釋難今此合論語家語之文以為一事故彼此文交互耳太宰問於子貢曰章太宰官名或吳或宋史記孔子世家孔子自楚反乎衛是歲也孔子年六十三而魯哀公六年也其明年吳與魯會繪徴百牢太宰嚭召季康子康子使子貢往然後得已宋世家殤公立以孔父嘉為司馬華督為太宰至平公以向帶為太宰魚府為少宰杜氏曰按春秋之時以太宰名官者惟吳宋與魯耳吳有太宰嚭宋有太宰華督事殤公其後九世至平公乃以向帶為太宰平公即位之歲距孔子過宋歷二公八十餘年其間或廢或不雖未可知然左氏及史記亦不復載不可考也况孔子過宋時遭桓司馬之厄遂微服而去豈復有問子貢者歟疑此太宰即吳嚭也吳與魯會繒嚭召季康子康子使子貢往焉則此當是吳太宰而亦當在此年也魯自公子鞏請於隱公欲殺桓以求太宰其後不復見欲罷不能章非所謂窈冥昏默莊子在宥篇黃帝曰敢問治身奈何而可以長久廣成子蹶音厥然而起曰善哉問乎來吾語去聲女至道至道之精窈窈烏了反冥冥至道之極昏昏默默無視無聽抱神以靜且子與其死於臣之手也章曽子將死起而易簀曰吾得正而斃焉斯已矣禮檀弓曽子寢疾病疾重曰病樂正子春坐於牀下子春曽子弟子曽元曽申坐於足元申曽子之子童子隅坐而執燭童子曰華而晥華板反華畫也晥明貌大夫之簀與平聲下同子春曰止曽子聞之瞿音句然曰呼瞿然驚貌呼虛憊之聲曰華而晥大夫之簀與曽子曰然斯季孫之賜也我未之能易也元起易簀曽元曰夫子之病革矣革急也不可以變變變動幸而至於旦請敬易之曽子曰爾之愛我也不如彼君子之愛人也以德細人之愛人也以姑息吾何求哉吾得正而斃焉斯已矣斃仆也舉扶而易之反席未安而沒子欲居九夷章東方之夷有九種後漢東夷傳夷有九種竹書紀年曰后芬即位三年九夷來御也曰畎夷于夷方夷黃夷白夷赤夷玄夷風夷陽夷竹書紀年曰后池二十一年命畎夷赤夷玄夷風夷陽夷后相即位二年征黃戾七年于夷來賔後少康即位方夷來賔也一曰東夷九類玄莵樂浪髙驪蒲飾鳬吏索豕東屠倭人天鄙吾未見好德如好色者也章史記孔子居衛靈公與夫人同車見前子見南子下後生可畏章曽子曰五十而不以善聞則不聞矣修身篇曽子曰年三十四十之間而無藝則無藝矣五十而不以善聞則不聞矣七十而未壞雖有後過亦可以免矣衣敝緼袍章袍衣有著者也著音貯禮玉藻纊音曠為繭緼為袍衣有著之異名也纊謂今之新綿也緼謂今纊及舊絮也襌音丹為絅音炯有衣裳而無裏帛為褶有表裏而無著未可與權章易九卦終於巽以行權繫辭下履以和行謙以制禮復以自知恆以一德損以逺害益以興利困以寡怨井以辨義巽以行權鄉黨篇朝與下大夫言章王制諸侯上大夫卿下大夫五人禮王制王者之制祿爵公侯伯子男凡五等諸侯之上大夫卿下大夫上士中士下士凡五等天子三公九卿二十七大夫八十一元士此夏制也明堂位曰夏后氏之官百舉成數也大國三卿皆命於天子下大夫五人上士二十七人次國三卿二卿命於天子一卿命於其君下大夫五人上士二十七人小國二卿皆命於其君下大夫五人上士二十七人揖所與立章上公九命周禮春官大宗伯以九儀之命正邦國之位每命異儀貴賤之位乃正春秋傳曰名位不同禮亦異數一命受職始見命為正吏謂列國之士於子男為大夫王之下士亦一命受職治職事再命受服受服受祭衣服為上士此受玄冕之服列國之大夫再命於子男為卿卿大夫自玄冕而下如孤之服王之中士亦再命則爵辨服三命受位受下大夫之位此列國之卿始有列位於王為王之臣也王之上士亦三命四命受器受祭器為上大夫此公之孤始得有祭器者也禮運曰大夫具官祭器不假聲樂皆具非禮也王之下大夫亦四命五命賜則則者法也地未成國之名王之下大夫四命出封加一等五命賜之以方百里二百里之地者方三百里以上為成國王莽時以二十五城為則方五十里合今俗説子男之地獨劉子駿等識古有此制焉六命賜官子男入為卿治一官也此王六命之卿賜官者使得自置其臣治家邑七命賜國王之卿六命出封加一等者出就侯伯之國八命作牧謂侯伯有功德者加命得專征伐於諸侯一州之牧王之三公亦八命九命作伯上公有功德者加命為二伯得征五侯九命者長諸侯為方伯擯用命數之半周禮秋官司寇大行人以九儀辨諸侯之命等諸臣之爵以同邦國之禮而待其賔客九儀謂命者五公侯伯子男也爵者四孤卿大夫士也上公之禮執桓圭九寸冕服九立早介九人禮九牢擯者五人諸侯之禮執信圭七寸冕服七章介七人禮七牢擯者四人諸伯執躬圭其他皆如諸侯之禮諸子執穀璧五寸冕服五章介五人禮五牢擯者三人諸男執蒲璧其他皆如諸子之禮又擯相之容周禮司儀掌九儀之賔客擯相之禮以詔儀容辭令揖讓之節出接賔曰擯入贊禮曰相以詔者以禮告王入公門章人君寧立之處禮曲禮下天子當依而立諸侯北面而見天子曰覲天子當寧而立諸公東面諸侯西面曰朝當依而立者依狀如屏風以絳為質髙八尺東西當户牖之間繡為斧文也亦曰斧依爾雅曰門屏之間謂之寧兩手摳衣使去地尺禮曲禮上兩手摳衣去齊尺氣容肅也禮玉藻君子之容舒遲見所尊者齊音咨遫音速謙恭貌也遫謂蹙蹙也足容重手容恭目容端口容止聲容靜頭容直氣容肅似不息也立容德色容莊執圭鞠躬如也章諸侯命圭周禮冬官考工記鎮圭尺有二寸天子守之命圭九寸謂之桓圭公守之命圭七寸謂之信圭侯守之命圭七寸謂之躬圭伯守之命圭者王所命之圭也朝覲執焉居則守之子守穀璧男守蒲璧不言之者闕耳使大夫執以通信禮郊特牲朝覲大夫之私覿非禮也大夫執圭而使所以申信也其君親來其臣不敢私見於主國君以君命聘則有私見不敢私覿所以致敬也執輕如不克禮曲禮下凡執主器執輕如不克舉前曳踵禮玉藻執龜玉舉前曳踵蹜蹜如也踵謂足後跟也謂曳足跟行不離地也既聘而享用圭璧有庭實又曰發氣滿容儀禮聘禮公受享幣擯者出請擯謂主國之君所使出接賔客者也擯出請賔不必賔事之有無賔裼禓者免上衣見禓衣奉束帛加璧享擯者入告出許許受之庭實工庭中所陳設之物下文皮幣馬是也工庭門屏之內皮則攝之毛在內內攝之入設也皮虎豹之皮攝之者右手并執前足左手并執後足毛在內不欲文之豫見也內攝之者兩手相向也入設亦參分庭一在南言則者或以馬也凡君於臣臣於君麋鹿皮可也記及享發氣焉盈容發氣舍氣也衆介北面蹌七羊反焉衆介者士也蹌容貌舒揚也君子不以紺緅飾章詩所謂蒙彼皺絺是也君子偕老瑳兮瑳兮其之展也蒙彼皺絺是袣袢也玉不去身禮曲禮下君無故玉不去身觽礪之屬禮內則子事父母雞初鳴咸盥潄櫛縰笄總拂髦冠緌纓端韠紳搢笏左右佩用左佩紛帨刀礪小觽金燧紛帨拭物之巾也刀礪小刀及厲礱也小觽解小結也觽貌如錐以象骨為之金燧可取火於日右佩玦捍管遰音滯大觽木燧捍謂拾也言可以捍弦也管筆彄也遰刀韠也木燧鑽火也逼逼行滕屨著綦綦屨繫也食不厭精章聶而切之禮少儀牛與羊魚之腥聶直涉反而切之為膾聶之為言䐑也先藿葉切之復報切之則成膾麋鹿為菹野豕為軒皆聶而不切軒音獻菹類也五穀不成果實未熟之類禮王制五穀不時果實未熟不粥於市物未成不利人木不中伐不粥於市伐之非時不中用周禮仲冬斬陽木仲夏斬隂木禽獸魚鱉不中殺不粥於市殺之非時不中用月令季冬始漁周禮春獻龞蜃漢陸續之母切肉未嘗不方後漢陸續傳續字智初會稽吳人也續詣洛陽詔獄漢明帝時楚王英謀反連及太守尹興及續時為尹興椽故坐就獄續被掠考肌肉消爛終無異辭續母逺至京師覘候消息獄事持急無緣與續相聞覘丑亷反母但作饋食付門卒以進之續雖見考苦毒而辭色慷慨未嘗易容唯對食悲泣不能自勝得食知母至悲泣不能自勝使者怪而問其故續曰母來不得相見故泣耳使者大怒以為獄門吏卒通傳意氣召將案之使者欲召守獄門吏案問之續曰因食餉羮識母自調和故知來耳非人告也使者問何以知母所作乎續曰母嘗截肉未嘗不方斷蔥以寸為度是以知之使者問諸謁舍謁舍所謂停主人之舍也續母果來於是隂嘉之上書説續行狀帝即赦興等事還里禁錮終身續以老病卒用醬各有所宜禮內則濡豚包苦實蓼濡雞醢醬實蓼濡魚卵醬實蓼濡鱉醢醬實蓼凡濡為烹之以汁和也苦苦荼也用以包豚殺其氣卵讀為鯤鯤魚子腵丁亂反修蚳直其反醢腵修捶脯施薑桂也蚳蚍蜉子也脯羹兔醢麋膚魚醢魚膾芥醬麋腥醢醬酒以為人合歡禮樂記先王因為酒禮一獻之禮賔主百拜終日飲酒而不得醉焉此先王之所以備酒禍也一獻士飲酒之禮百拜以喻多故酒食者所以歡合也肺為氣主素問五藏生成篇諸脈者皆屬於目諸髓者皆屬於腦諸筋者皆屬於節諸血者皆屬於心諸氣者皆屬於肺肺藏主氣故也六十杖於鄉禮王制五十杖於家六十杖於鄉七十杖於國八十杖於朝九十者天子欲有問焉則就其室以珍從鄉飲酒之禮六十者坐五十者立侍以聽政役所以明尊長也六十者三豆七十者四豆八十者五豆九十者六豆所以明養老也愚謂朱子獨引六十杖於鄉不曰七十八十九十者省文也言六十則七十以上者可知蓋六十杖於鄉而於鄉字切言於國於朝則於鄉不必言也杖於家者則未可杖於鄉故立侍以聽政役此見集注釋之精也周禮方相氏掌之夏官方相氏方相猶言放想可畏怖之貌蒙熊皮黃金四目玄衣朱裳執戈揚盾可畏怖也帥與同率百隸𨽻同而時難音難帥領百𨽻之人而歲除難以索室驅疫以索室中疫鬼而驅遣之月令季冬命國儺索搜也君賜食章或餕餘故不以薦禮曲禮上餕餘不祭父不祭子夫不祭妻履齊孫氏曰所謂餕餘者食物之餘雖妻子皆卑而父與夫亦不以食餘之物而祭之嫌其黷也然則非食物之餘焉有不祭者乎周禮王日一舉膳夫授祭品嘗食天官膳夫掌王之食飲膳羞以養王及后世子食飯也飲酒漿也膳牲肉也羞有滋味者凡養之具大略有四王曰一舉鼎十有二物皆有爼殺牲盛饌曰舉王一日舉以朝食也后與王同庖鼎十有二牢鼎九陪鼎三謂物牢鼎之實亦九爼以樂侑食膳夫授祭品嘗食王乃食侑猶勸也祭謂刌肺賚也禮飲食必祭示有所先品者每物皆嘗之道尊者也刌寸本反卒食以樂徹于造人惟萬物之靈而王者之所天也前漢酈食音異其音基陳留髙陽人事髙祖曰王者以民為天而民以食為天天者人資而生者也王資民力而生不可忽也食得之則生弗得則死故民以食為天獻民數於王王拜受之周禮秋官司民掌登萬民之數自生齒以上皆書於版辨其國中與其都鄙及其郊野異其男女歲登下其死生登上也男八月女七月而生齒版今户籍也下猶去也每歲更著生去死及三年大比以萬民之數詔司寇司寇及孟冬祀司民之日獻其數于王王拜受之登于天府若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐禮玉藻君子之居恆當户鄉明寢恆東首首生氣也若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐敬天之怒顧不過轂禮曲禮車上不廣咳不妄指立視五嶲立平視也嶲猶規也謂輪轉之度式視馬尾顧不過轂轂車轂也若轉頭不得過轂過轂則掩後人私也色斯舉矣章嗅當作狊古閴反張兩翅也見爾雅爾雅釋獸須屬獸曰釁許靳反獸之自奮迅動作名釁人曰嬌紀小反人之罷倦頻仲夭嬌舒展屈折名嬌魚曰須魚之鼓動兩頰若人之欠須導其氣息者名須鳥曰狊鳥之張兩翅狊狊然搖動者名狊此皆氣倦體罷所須若此故題云須屬也論語集注通證卷上
