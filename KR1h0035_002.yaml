body:
  text: 欽定四庫全書論語集注通證卷下元張存中撰先進篇南容三復白圭章一日三復此言事見家語弟子行獨居思仁公言思義其於詩也則一日三復白圭之玷是宫縚之行也孔子信其能仁以為異士顔路請子之車章脫驂以賻之禮檀弓孔子之衛遇舊館人之喪入而哭之哀出使子貢説音脫驂音參而賻音附之騑馬曰驂賻助也以馬助喪用也門人欲厚葬之章喪具稱家之有無禮檀弓子遊問喪具夫子曰稱家之有無子遊曰有無惡乎齊夫子曰有無過禮苟亡矣斂手足形還葬縣音玄棺而封人豈有非之者哉閔子侍側章子路卒死於衛孔悝之難左傳哀公十五年衛孔圉取太子蒯聵之姊生悝孔圉孔文子也蒯聵姊孔伯娣太子自戚入適伯姬氏既食孔伯姬杖戈而先太子與五人介輿豭從之介被甲輿豭豚欲以盟迫孔悝於厠強盟之孔氏專政故劫孔悝欲令逐輒遂劫以登臺欒寧聞亂使告季子季子子路也為孔氏邑宰召獲奉衛侯輒來奔季子將入遇子羔將出子羔衛大夫髙柴孔子弟子將出奔曰門已閉矣季子曰吾姑至焉子羔曰弗及不踐其難言政不及已可不須踐其難季子曰食焉不辟其難子羔遂出子路入及門有使者出乃入曰太子焉用孔悝雖殺之必或繼之且曰太子無勇若燔臺半必舍孔叔太子聞之懼下石乞孟黶敵子路太子蒯瞶黨敵當也以戈擊之斷纓子路曰君子死冠不免結纓而死由之瑟章家語云子路鼓瑟有北鄙殺伐之聲辨樂解子路鼓瑟孔子聞之謂冉有曰甚矣由之不才也夫先王之制音也奏中聲以為節流入於南不居於北夫南者生育之鄉北者殺伐之城故君子之音溫柔居中以養生育之氣憂愁之感不加於心也暴厲之動不在於體也夫然者乃所謂治安之風也小人之音則不然亢厲微末以象殺伐之氣中和之感不載于心溫和之動不存于體夫然者乃所以為亂之風柴也愚章家語記其足不履影啓蟄不殺方長不折避難而行不徑不竇弟子行髙柴自見孔子出入於户未嘗越履往來過之足不履影啓蟄不殺方長上聲不折執親之喪泣血三年未嘗見齒是髙柴之行也孔子曰柴於親喪則難能也啓蟄不殺則順人道方長不折則恕仁也成湯恭而以恕是以日躋躋升也致思蒯瞶之亂季羔逃之走郭門守門者謂季羔曰彼有缺季羔曰君子不踰又曰彼有竇季羔曰君子不隧隧從竇出又曰於此有室季羔乃入焉億則屢中章夫子嘗曰賜不幸言而中左傳定公十五年邾隱公來朝邾子益子貢觀焉邾子執玉髙其容仰公受玉卑其容俯玉朝者之贄子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之體也將左右周旋進退俯仰於是乎取之朝祀喪戎於是乎觀之今正月相朝而皆不度不合法度心已亡矣嘉事不體何以能久嘉事朝禮髙仰驕也卑俯替也驕近亂替近疾君為主其先亡乎為此年公薨哀七年師宵掠以邾子益來獻于亳社夏五月壬申公薨仲尼曰賜不幸言而中是使賜多言者也子畏於匡章民生於三事之如一國語晉語欒共音恭子曰欒共子名成諡曰共民生於三事之如一父生之師教之君食之非父不生非食不長非教不知非師則無以開示訓誨雖生而不知所以俱生之理與禽獸何以異哉生之族也族類也謂君之養已師之所以教已與生我之恩同類也故一事之唯其所在則致死焉在父為父在師為師在君為君子畏於匡以顔淵為死是時顔路尚在此在師為師也史傳紀忠義凡死於君事者皆不得顧其親蓋移事父之道以事君忠孝無兩全之理此在君為君也報生以死報賜以力人之道也子路使子羔為費宰章古者學而後入政左傳襄公三十一年僑聞學而後入政未聞以政學者也宗廟之事如會同章時見曰會衆眺曰同周禮春官大宗伯春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰會殷見曰同此六禮者以諸侯見王為文六服之內四方以時分來或朝春或宗夏或覲秋或遇冬名殊禮異更遞而遍朝猶朝也欲其來之早宗尊也欲其尊王覲之言勤也欲其勤王之事遇偶也欲其若不期而偶至時見者言無常期諸侯有不順服者王將有征討之事則既朝覲王為壇於國外合諸侯而命事焉春秋傳曰有事而會不協而盟是也殷有衆也十二嵗王如不巡守則六服盡朝朝禮既畢王亦為壇合諸侯以命政焉所命之政如王巡守殷見四方四時分來終嵗則遍時聘曰問殷眺曰視時聘者亦無常期天子有事乃聘之焉竟外之臣既非朝嵗不敢瀆為小禮殷眺謂一服朝之嵗以朝者少諸侯乃使卿以大禮衆聘焉一服朝在元年七年十一年點爾何如章以齒為序則點當次對史記仲尼弟子傳仲由字子路卞人也少孔子九嵗曽點字晳與子參皆侍孔子按史記家語載曽參少孔子四十六嵗則曽點必少孔子二十餘嵗合居其次冉求字子有仲弓之族也少孔子二十九嵗公西赤字子華魯人少孔子四十二嵗顔淵篇顔淵問仁章如事事之事書説命惟事事乃其有備有備無患史記曹參傳卿大夫已下吏及賔客見參不事事不事丞相之事人皆有兄弟章子夏哭子喪明禮檀弓上子夏喪其子而喪其明膚受之訴章如易所謂剝牀以膚切近災者也剝六四象曰盍徹乎章魯自宣公稅畝春秋宣公十五年初稅畝公田之法十取其一今又履其千畝復十收其一故哀公曰二吾猶不足遂以為常故曰初左傳初稅畝非禮也榖出不過籍周法民耕百畝公田中畝借民力而治之稅不過此以豐財也齊景公問政章孔子適齊史記孔子世家孔子年三十五而季平子與郈昭伯以鬬雞故得罪魯昭公昭公率師擊平子平子與孟氏叔孫氏三家共攻昭公昭公師敗奔於齊齊處昭公乾侯其後頃之魯亂孔子適齊為髙昭子家臣欲以通乎景公景公問政於孔子陳氏厚施於國左傳昭公二年晉少薑卒少薑齊女晉侯嬖妾三年齊侯使晏嬰請繼室於晉既成昏晏子受禮叔向從之宴相與語叔向曰齊其何如晏子曰此季世也吾弗知齊其為陳氏矣不知其他唯知齊將為陳氏公棄其民而歸於陳氏齊舊四量音亮豆區烏侯反釜鍾四升為豆各自其四以登於釜四豆為區區斗六升四區為釜釜六斗四升登成也釜十則鍾六斛四斗陳氏三量皆登一焉鍾乃大矣登加也加一謂加舊量之一也以五升為豆五豆為區五區為釜則區二斗釜八斗鍾八斛釋文舊本以五升為豆四豆為區四區為釜直加豆為五升而區釜自大故杜云區二斗釜八斗是也本或作五豆為區五區為釜者為加舊豆區為五亦與杜預注相合非於五升之豆又五五而加也以家量貸而以公量收之貸厚而收薄山木如市弗加於山魚鹽蜃蛤弗加於海賈如在山海不加貴民參七南反其力二入於公而衣食其一言公重賦斂公聚朽蠧而三老凍餒三老謂上夀中夀下夀皆八十以上不見養遇國之諸市屨賤踊貴踊刖足者屨也刖足者多故屨賤無用踊有用故貴民人疾痛而或燠於位反休虛位反之燠休痛念之聲謂陳氏也其愛之如父母而歸之如流水欲無獲民將焉辟之二十六年齊侯與晏子坐於路寢公歎曰美哉室其誰有此乎景公自知德不能久有國故歎也晏子曰敢問何謂也公曰吾以為在德對曰如君之言其陳氏乎陳氏雖無大德而有施式豉反於民豆區釜鍾之數其取之公也薄謂以公量收其施之民也厚謂以私量貸公厚斂焉陳氏厚施焉民歸之矣詩曰雖無德與女式歌且舞詩小雅義取雖無大德要有喜悅之心欲歌舞之式用也陳氏之施民歌舞之矣後世若少惰陳氏而不亡則國其國也己公曰善哉是可若何對曰唯禮可以已之在禮家施不及國民不遷農不移工賈不變守常業士不濫不失職官不滔滔慢也大夫不收公利不作福公曰善哉我不能矣吾今而後知禮之可以為國也景公又多內嬖而不立太子左傳哀公五年齊燕姬生子不成而死燕姬景公夫人不成未冠也諸子鬻姒之子荼嬖諸子庶子也鬻姒景公妾荼安孺子諸大夫恐其為太子也言於公曰君之齒長矣未有太子若之何公曰二三子間音間於憂虞則有疾疢亦姑謀樂何憂於無君景公意欲立荼而未發故以此言塞大夫請公疾使國惠子髙昭子立荼惠子國夏昭子髙張置羣公子於萊萊齊東鄙邑秋景公卒冬公子嘉公子駒公子黔奔衛公子鉏公子陽生來奔皆景公子在萊者六年八月陳僖子使召公子陽生而立之是為悼公公使朱毛遷孺子於駘不至殺諸野幕之下啓陳氏弒君篡國之禍史記田敬仲完世家完五世孫田釐子乞事齊景公為大夫其收賦稅於民以小斗受之其粟子民以大斗行隂德於民而景公弗禁由此田氏得齊衆心宗族益強民思田氏景公太子死後有寵姬曰芮子生子荼景公病命其相國惠子髙昭子以荼為太子景公卒兩相髙國立荼是為晏孺子而田乞不悅欲立景公他子陽生陽生素與乞歡晏孺子之立也陽生奔魯田乞鮑牧與大夫以兵入公室攻髙昭子殺之惠子奔莒晏孺子奔魯田乞使人迎陽生至齊遂立陽生於田乞之家是為悼公乃使人殺孺子荼悼公既立田乞為相專齊政四年田乞卒子恆代立是為田成子鮑牧與齊悼公有隙弒悼公齊人共立其子壬是為簡公田恆與監止一作闞俱為左右相相簡公田恆心害監止監止幸於簡公權弗能去於是田恆復修釐子之政以大斗出貸以小斗收齊人歌之曰嫗乎采芑歸乎田成子田恆擊殺子我及監止簡公出奔田氏之徒遂殺簡公於徐州恆立簡公之弟驁是為平公平公即位田恆為相田恆言於平公曰德施人之所欲君其行之刑罰人之所惡臣請行之行之五年齊國之政皆歸田恆田恆於是盡誅鮑晏及公族之強者而割齊自安平以東至琅邪自為封邑封邑大於平公之所食田恆卒子襄子盤代立襄子卒子莊子白代立莊子卒子太公和立田和遷齊康公於海上食一城以奉其先祀康公之十九年田和立為齊侯列於周室紀元年齊侯太公和立二年卒子桓公午立六年桓公卒子威王因齊立二十六年自稱為王以令天下子路無宿諾章小邾射以句繹奔魯左傳哀公十四年小邾射音亦以句繹音勾亦來奔射小邾大夫句繹地名曰使季路要我吾無盟矣子路信誠故欲得與相要誓而不須盟使子路子路辭季康子使冉有謂之曰千乘之國不信其盟而信子之言子何辱焉對曰魯有事於小邾不敢問故死其城下可也彼不臣而濟其言是義之也由弗能季康子患盜章康子奪嫡事見春秋傳左傳哀公三年秋季孫有疾命正常曰無死正常桓子之寵臣欲付以後事故敕令勿從已死南孺子之子男也則以告而立之南孺子季桓子之妻言若生男告公而立之女也則肥也可肥康子也季孫卒康子即位既葬康子在朝在公朝也南氏生男正常載以如朝告曰夫子有遺言命其圉臣曰南氏生男則以告於君與大夫而立之今生矣男也敢告遂奔衛康子請退退辭位也公使共劉視之共劉魯大夫則或殺之矣乃討之討殺者召正常正常不反畏康子也子路篇子適衛冉有僕章明帝尊師重傅臨雍拜老東漢禮儀志明帝永平二年三月上始帥羣臣躬養三老五更于辟雍三老老人知天地人事五更老人知五行更代之事者名三五者取象三辰五星天所因以昭明天下者明帝紀三老謂李躬年耆學明五更謂桓榮授帝尚書也帝帥羣下之臣則奉養之于辟雍天子之學三老五更皆服都紵大袍單衣皂緣領袖中衣冠進賢吉緇布冠也又儒者之服也前髙二寸後髙三寸長八寸公侯三梁太傅司空司徒著進賢冠三梁冠黑介幘扶玉杖䇿玉飾之杖五更亦如之不杖皆齋於太學講堂其日吉日也乘輿先到辟雍禮殿御坐東廂遣使者安車迎三老五更安車坐乘之車也以蒲裹輪令老者坐而安穩也遣使者以此車迎三老五更就車天子迎於門屏交禮報拜也道自阼階三老升自賔階至階天子揖如禮三老升東面三公設几九卿正履天子親袒割牲執醬而饋執爵而酳音胤潄也祝鯁在前祝饐在後老人食多哽咽故置人於前後祝之令其不哽咽也五更南面三公進供禮亦如之明日皆詣闕謝恩以見禮遇大尊顯故也唐太宗大召名儒增廣生員唐書儒學傳貞觀六年詔罷周公祠初祀周公至此乃罷更以孔子為先聖顔氏為先師盡召天下惇師老德以為學官數臨幸觀釋菜命祭酒博士講論經義賜以束帛太宗幸國子監觀釋奠孔聖之禮命祭酒孔頴逹講孝經賜祭酒以下至諸生髙弟幣帛有差生能通一經者得署吏廣學舍千二百區諸生員至三千二百自玄武屯營飛騎皆給博士受經能通一經者聽入貢限四方秀艾挾䇿負素坌去聲集京師文治煟于貴反然勃興於是新羅新羅辨韓苗裔也漢樂浪地橫千里縱三千里東距長人東南日本西自濟南瀕海北髙麗而王居金城環八百里髙昌直唐京師西四千里而贏其橫八百里縱五百里凡二十一牧王都交河城漢車師前王廷也百濟扶餘别種也直唐京師六千里而贏濱海之隅西界越州南倭北髙麗皆踰海乃至東新羅也王居東西二城吐蕃本西羌屬蓋百有十五種散處河湟江浪間而性勃窣野南涼秃髮利鹿狐之後髙麗本扶餘别種也地東跨海距新羅南亦跨海距百濟西北渡遼水與營州接比靺鞨其君居平衮城亦謂長安城漢樂浪郡也去唐京師五千里而贏等羣酋慈秋反長上聲並遣子弟入學鼓笥踵堂者凡八千餘人紆侈袂曳方履誾誾秩秩雖三代之盛所未聞也苟有用我者章蓋為衛靈公不能用而發見孟子萬章下冉子退朝章語意與魏徴獻陵之對略相似唐書魏徴傳徴字玄成太宗拜徴特進知門下省事魏州曲城人文德皇后既葬文德后即太宗后也后死而既葬是為昭陵帝即苑中作層觀以望昭陵引徴同升徴熟視曰臣昏眊不能見帝指視之徴曰此昭陵邪帝曰然徴曰臣以為陛下望獻陵獻陵乃太宗之毋陵也昭陵則臣固見之帝泣為毁觀帝感悟徴言之幾泣而遂毁其觀定公問一言章如幾如式詩小雅楚茨如幾音機如式幾期也春秋傳曰易幾而哭是也憲問篇愛之能勿勞乎章禽犢之愛婦寺之忠東漢楊彪傳彪子修為操所殺操見彪問曰公何瘦之甚對曰愧無日磾讀作密低先見之明猶有懷老牛舐神旨反犢之愛操為之改容詩大雅瞻仰匪教匪誨時維婦寺刺幽王嬖褒姒任奄人以致亂之詩寺奄人也蓋其言雖多而非有教誨之益者是惟婦人與奄人耳為命裨諶草創之章鄭國之為辭命必更此四賢之手而成左傳襄公三十一年北宫文子相衛襄公以如楚過鄭印段迋于況反勞於棐林如聘禮而以勞辭文子入聘報印段子羽為行人馮簡子與子太叔逆客事畢而出言於衛侯曰鄭有禮其數世之福也其無大國之討乎詩云誰能執熱逝不以濯禮之於政如熱之有濯也濯以救熱何患之有此以上文子辭子産之從政也擇能而使之馮簡子能斷大事子太叔美秀而文其貌美其才秀公孫揮能知四國之為知諸侯所欲為而辨於其大夫之族姓班位貴賤能否而又善為辭令裨諶能謀謀於野則獲得所謀也謀於邑則否此才性之敝鄭國將有諸侯之事子産乃問四國之為於子羽且使多為辭令與裨諶乘以適野使謀可否而告馮簡子使斷之事成乃授子太叔使行之以應對賔客是以鮮有敗事北宫文子所謂有禮也或問子産子曰惠人也章子産之政不專於寬左傳昭公二十年鄭子産有疾謂子太叔曰我死子必為政唯有德者能以寬服民其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而玩之狎輕也則多死焉故寬難難以治疾數月而卒太叔為政不忍猛而寬鄭國多盜取人於萑音丸苻音蒲之澤萑苻澤名於澤中劫人大叔悔之曰吾早從夫子不及此興徒兵以攻萑苻之盜盡殺之盜少止子西能遜楚國立昭王而改紀其政左傳昭公二十六年楚平王卒令尹子常欲立子西子西平王之長庶曰太子壬弱其母非適也壬昭王也王子建實聘之子西長而好善立長則順建善則治王順國治可不務乎子西怒曰是亂國而惡君王也言王子建聘之是彰君王之惡國有外援不可瀆也外援秦也瀆慢也王有適嗣不可亂也敗親速讎不立壬秦將來討是速召仇也亂嗣不祥我受其名受惡名賂吾以天下吾滋不從也滋益也楚國何為必殺令尹令尹懼乃立昭王定公六年吳太子終纍敗楚舟師終纍闔閭子夫差兄舟師水戰獲潘子臣小惟子二子楚舟師之帥及大夫七人楚國大惕懼亡子期又以陵師敗於繁陽陵師陸軍令尹子西喜曰乃今可為矣言知懼而後可治於是乎遷郢於鄀音若而改紀其政以定楚國傳言楚賴子西以安南人謂陸為陵卒召白公以致禍亂見大學或問下荀卿所謂與之書社三百荀子仲尼篇齊桓公有天下之大節焉夫孰能亡之大節謂節義也倓徒甘反然見管仲之能足以託國也是天下之大知也倓安也安然不疑也安忘其怒出忘其讎遂立以為仲父是天下之大決也立為仲父而貴戚莫之敢妒也與髙國之位而本朝之臣莫之敢惡也與之書社三百而富人莫之敢距也書社謂社之户口書於版圗周禮二十五家為社距敵也言齊之富人莫有敢敵管仲者貴賤少長莫不秩秩焉從桓公而貴敬之是天下之大節也臧武仲以防求為後於魯章武仲得罪奔邾自邾如防左傳襄公二十三年孟孫卒公鉏奉羯立之孺子秩奔邾臧孫入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫若死其若之何臧孫曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石夫石猶生我疢之美其毒滋多孟孫死吾亡無日矣十月孟氏將辟婢亦反藉音借除於臧氏辟穿藏也於臧氏借人除葬道臧孫使正夫助之正夫遂正除於東門甲從才用反已而視之畏孟氏故從甲士視作者孟氏告季孫季孫怒命攻臧氏見其有甲故臧紇斬鹿門之關以出奔邾魯南城東門臧武仲自邾使告臧賈且致大蔡焉蔡出龜因號大龜為大蔡曰紇不佞失守宗祧敢告不弔紇之罪不及不祀子以大蔡納請其可賈曰是家之禍也非子之過也賈聞命矣再拜受龜使為以納請賈使為為已請遂自為也臧孫如防使來告曰紇非能害也知不足也言使甲從已但慮事淺耳非敢私請苟守先祀無廢二勳二勳文仲宣叔敢不辟邑乃立臧為臧紇致防而奔齊與之田邑晉文公譎而不正章然桓公伐楚仗義執言左傳僖公四年春齊侯以諸侯之師侵蔡蔡潰齊桓公霸諸侯攘夷狄尊天子蔡自北杏一與中國之會而棄我諸姬甘心黨楚故齊帥諸侯伐楚而先事侵蔡潰蔡者先披楚之黨也遂伐楚楚子使與師言曰君處北海寡人處南海唯是風馬牛不相及也牝牡相誘曰風言雖馬牛風逸牝牡相誘亦不相及喻齊楚逺不相干也不虞君之涉吾地也何故管仲對曰昔召康公命我先君大音太公曰五侯九伯女實征之以夾輔周室賜我先君履履所踐履之界東至于海西至于河南至于穆陵索隱曰淮南有故穆陵門是楚之界北至于無棣索隱曰無棣在遼西孤竹服虔以為太公受封境界所至不然也蓋言其征伐所至之域也爾貢包茅不入以下皆責楚討罪之辭包裹束也禹貢荆州包匭菁茅蓋取三脊之茅包裹匭匣盛之以貢周王祭不共音供無以縮酒祭祀必束茅而灌之以酒為縮酒寡人是徴徵亦問也昭王南征而不復昭王周成王孫南巡狩濟漢水舟壞而溺死寡人是問對曰貢之不入寡君之罪也敢不共給昭王之不復君其問諸水濵蓋昭王時漢非楚境故楚不服其罪師進楚不服罪故復進師次干陘楚語云先君蚡冒之所服陘隰也陘必為楚之要地故齊以諸侯之師進而據之焉夏楚子使屈完如師屈完楚大夫師退屈完請盟故退師次于召陵次于召陵之地以聽楚成文公則伐衛以致楚而隂謀以取勝左傳僖公二十八年春晉侯將伐曹假道於衛曹在衛東故也衛人弗許還自南河濟從汲郡南渡出衛南而東侵曹伐衛正月戊申取五鹿衛地楚人救衛不克公懼於晉殺子叢以説焉召子叢而殺之以謝晉説音悅謂楚人曰不卒戍也晉侯圍曹門焉多死曹人尸諸城上磔晉死人於城上晉侯患之聽輿人之謀曰稱舍於墓輿衆也舍墓為將發塜師遷焉曹人凶懼遷至曹人墓凶凶恐懼聲因其凶也而攻之三月丙午入曹數之以其不用僖負羈賢人也執曹伯分曹衛之田以卑宋人楚子入居于申申在方城內使子玉去宋曰無從晉師子玉使宛春告於晉師曰請復衛侯而封曹臣亦釋宋之圍子犯曰子玉無禮哉君取一臣取二君取一以釋宋圍惠晉侯臣取二復衛曹為己功不可失矣言可伐先軫曰子與之定人之謂禮楚一言而定三國我一言而亡之我則無禮何以戰乎不許楚言是棄宋也救而棄之謂諸侯何言將為諸侯所怪楚有三施我有三怨怨讎已多將何以戰不如私許復曹衛以攜之私許二國使告絶于楚而後復之攜離也執宛春以怒楚既戰而後圖之公説乃拘宛春於衛且私許復曹衛曹衛告絶於楚子玉怒從晉師己巳晉師陳于莘北云云楚師敗績晉師三日館榖館舍也食楚軍榖三日桓公殺公子糾章春秋傳齊襄公無道左傳莊公八年齊侯使連稱管至父戍葵丘二人皆齊大夫戍守也葵丘齊地臨淄縣西有地名葵丘瓜時而往曰及瓜而代期音基戍公問不至問命也請代弗許故謀作亂僖公之母弟曰夷仲年生公孫無知有寵於僖公衣服禮秩如適適太子襄公絀之二人因之以作亂二人連稱管至父十二月遂弒襄公而立無知初襄公立無常政令無常鮑叔牙曰君使民慢亂將作矣奉公子小白出奔莒鮑叔牙小白傅小白僖公庶子亂作管夷吾召忽奉公子糾來奔管夷吾召忽皆子糾傅也子糾小白庶兄來不書皆非卿也九年春雍廩殺無知雍廩齊大夫夏公伐齊納子糾桓公自莒先入秋師及齊師戰于乾時我師敗績鮑叔帥師來言曰子糾親也請君討之鮑叔乘勝而進軍志在生得管仲故託不忍之辭管召讎也請受而甘心焉管仲射桓公故曰讎甘心言欲快意戮殺之乃殺子糾于生竇魯地召忽死之管仲請囚鮑叔受之及堂阜而稅他活反之堂阜齊地東管蒙隂縣西北有夷吾亭或曰鮑叔解夷吾縛於此因以為名歸而以告曰管夷吾治於髙傒音奚髙傒齊卿髙敬仲也言管仲治理政事之才多於敬仲使相可也公從之九春秋傳作糾左傳僖公二十六年齊孝公伐我北鄙公使展喜犒師曰昔周公太公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也載在盟府載載書也太師職之職主也太公為太師兼主司盟之官桓公是以糾合諸侯而謀其不協彌縫其闕而匡救其災昭舊職也管仲非仁者與章後漢書引此文莫字上有人字應劭字仲逺獻帝時奏議曰昔召忽親死子糾之難而孔子曰經於溝瀆人莫之知鼂氏之父非錯刻峻能自隕其命班固亦云不如趙母指括以全其宗桓公兄也子糾弟也前漢淮南厲王長髙帝少子也文帝即位厲王驕恣不用漢法出入警蹕稱制自作法令數上書不遜順文帝重自切責之重難也時帝舅薄昭為將軍尊重上令昭與厲王書諫數之曰昔者周公誅管叔放蔡叔以安周齊桓殺其弟以反國韋昭曰子糾兄也弟者諱也秦始殺兩弟遷其母以安秦唐之王圭魏徵不死建成之難唐書魏徵傳入關隱太子引為洗馬太子建成也洗馬官也徵見秦王功髙隂勸太子早為計秦王太宗也建成弟封為秦王太子敗太宗伏兵於玄武門建成元吉至臨湖殿覺變即跋馬東歸宫府太宗射建成殺之王責謂曰秦王責魏徵曰爾閲吾兄弟奈何閲間也答曰太子蚤從徵言不死今日之禍王器其直無恨意器重也即位太宗即帝位拜諫議大夫王圭傳圭字玠叔世居郿僧辨之孫建成為皇太子授中書舍人遷中允禮遇良厚太子與秦王有隙太子黨中小人疾秦王功髙相猜忌有隙帝責圭不能輔導流嶲州太子已誅太宗召為諫議大夫公叔文子章諡法亦有所謂錫民爵位曰文見前孔文子章子言衛靈公之無道也章無競維人四方其訓之詩大雅抑篇陳成子弒簡公章事在春秋哀公十四年齊簡公之在魯也闞止有寵焉簡公悼公陽生子壬也闞止子我也事在六年及即位使為政陳成子憚之驟顧諸朝成子陳恆心不安故數顧之諸御鞅言於公鞅齊大夫曰陳闞不可並也君其擇焉擇用一人弗聽五月壬申成子殺子我庚辰執公于舒州甲午陳恆弒其君壬于舒州壬簡公也孔子三日齊側皆反而請伐齊三公曰魯為齊弱久矣子之伐之將若之何對曰陳恆弒其君民之不與者半以魯之衆加齊之半可克也公曰子告季孫孔子辭辭不告退而告人曰吾以從大夫之後也故不敢不言弒君之賊人人得而討之禮檀弓下臣弒君凡在官者殺無赦子弒父凡在官者殺無赦殺其人壞其室汙其地而豬焉蘧伯玉使人於孔子章莊周稱伯玉行年五十而知四十九年之非淮南子原道訓蘧伯玉年五十而知四十九年非衛大夫蘧瑗今年所行是則顧知去年之所行非也嵗嵗悔之以至於死故有四十九年非伯玉行年六十而六十化莊子則陽篇蘧伯玉行年六十而六十化未嘗不始於是之而卒詘與屈同之以非也未知今之所謂是之非五十九非也以德報怨何如章見老子書道德經恩始章曰大小多少報怨以德圖難於其易為大於其細修己以敬章四靈畢至矣禮禮運四靈以為畜許又反故飲食有由也何謂四靈麟鳳龜龍謂之四靈原壤夷俟章母死而歌禮檀弓下孔子之故人曰原壤其母死孔子助之沐椁原壤登木曰久矣子之不託於音也歌曰貍首之斑然執女手之卷然夫子為弗聞也者而過之從者曰子未可以已乎夫子曰吾聞之親者無失其為親也故者無失其為故也衛靈公篇衛靈公問陳章孔子去衛適陳史記世家孔子適衛主蘧伯玉家他日靈公問兵陳于孔子云云明日與孔子語見蜚雁仰視之色不在孔子遂行復如陳是嵗魯哀公三年孔子年六十矣立則見其參於前也章毋往參焉之參禮曲禮上直哉史魚章死猶以尸諫家語困誓篇衛蘧伯玉賢而靈公不用彌子瑕不肖反任之史魚驟諫而不從史魚病將卒命其子曰吾在衛朝不能進蘧伯玉退彌子瑕是吾為臣不能正君也生不能正君則死無以成禮我死汝置尸牖下於我畢矣禮飯於牖下小斂於户內大斂於阼殯於客位也其子從之靈公弔焉怪而問焉其子以其父言告公公愕然失容曰是寡人之過也於是命之殯於客位進蘧伯玉而用之退彌子瑕而逺之孔子聞之曰古之列諫之者死則已矣未有若史魚死而尸諫忠感其君者也可不謂直乎孫林父寧殖放弒之謀左傳襄公十四年衛獻公戒孫文子寧惠子食敕戒二子欲共晏食皆服而朝日旰不召而射鴻於囿二子從之不釋皮冠而與之言皮冠田獵之冠也二子怒孫文子如戚孫蒯入使公飲之酒使太師歌巧言之卒章蒯懼告文子文子曰君忌我矣弗先必死并孥於戚而入見蘧伯玉曰君之暴虐子所知也大懼社稷之傾覆將若之何對曰君制其國臣敢姦之雖姦之庸知愈乎遂行從近關出公使子蟜子伯子皮與孫子盟於丘宫孫子皆殺之四月公出奔齊衛人立公孫剽孫林父寧殖相之子貢問為仁章子貢悅不若己者家語六本篇孔子曰吾死之後則商也日益賜也日損曽子曰何謂也子曰商也好與賢己者處賜也好與不若己者處不知其子視其父不知其人視其友不知其君視其所使不知其地視其草木故曰與善人居如入芝蘭之室久不聞其香即與之化矣與不善人居如入鮑魚之肆久不聞其臭亦與之化矣丹之所藏者赤漆之所藏者黑是以君子必慎其所與處焉顔淵問為邦章天開於子地闢於丑人生於寅皇極經世書天開於子地闢於丑人生於寅蓋以數推之一元有十二會三百六十運四千三百二十世十二萬九千六百年歲月日時元會運世皆十二而三十三十而十二至寅上方生人物是開物堯時會在己午之間戍上是閉物到那裏則不復有人矣吾得夏時焉禮禮運孔子曰我欲觀夏道是故之杞而不足徴也吾得夏時焉我欲觀殷道是故之宋而不足徵也吾得坤乾焉坤乾之義夏時之等吾以是觀之其書存者有小正今大戴記有夏小正篇木輅也禮明堂位鸞車有虞氏之路也勾車夏后氏之路也大路殷路也乘路周路也大路木路也周人飾以金玉周禮春官巾車掌王之五路一曰玉路王在焉曰路金路象路革路木路不鞔以革漆之而已鞔莫干反周冕有五周禮春官司服王之吉服祀昊天上帝則服大裘而冕祀五帝亦如之享先王則衮冕享先公饗射則鷩冕祀四望山川則毳冕祭社稷五祀則希冕祭羣小祀則玄冕六服同冕者首飾尊也大裘羔裘也九章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彞皆畫以為繢次六曰藻次七曰粉米次八曰黼次九曰黻皆希以為繡則衮之衣五章裳四章凡九章也鷩畫以雉謂華蟲也其衣三章裳四章凡七章也毳畫虎蜼謂宗彞也其衣三章裳二章凡五章也希刺粉米無畫也其衣二章裳一章凡三章也玄者衣無文裳刺黻而已是以謂玄焉凡冕服皆玄衣纁裳鄭聲佞人能使人喪其所守禮樂記魏文侯問於子夏曰吾端冕而聽古樂則惟恐卧聽鄭衛之音則不知倦何也子夏對曰今君之所好者其溺音乎文侯曰敢問溺音何從出也子夏對曰鄭音好濫淫志宋音燕女溺志衛音趨音促數音朔煩志齊音敖傲同辟僻同喬驕同志此四者皆淫於色而害於德是以祭祀弗用也詩云肅雍和鳴先祖是聽臧文仲其竊位者與章孔子以為不仁詳見公冶長臧文仲章君子義以為質章敬以直內義以方外易坤卦文言直其正也方其義也君子敬以直內義以方外相師之道也章瞽必有相周禮春官大師下大夫二人少師上士四人瞽矇三百人眂音示瞭三百人凡樂之歌必使瞽矇為焉命其賢智者以為大師少師眂讀為虎眂之眂瞭明目也眂瞭掌大師之縣音玄大師之縣鍾磬之類凡樂事相瞽相謂扶助瞽矇作樂眂瞭扶之季氏篇季氏將伐顓臾章左傳史記二子仕季氏不同時哀公十一年齊國書髙無丕帥師伐我及清清齊地齊北盧縣東有清亭季孫謂其宰冉求曰齊師在清必魯故也若之何求曰一子守二子從公禦諸竟孟孺子泄帥右師孺子孟懿子之子武伯顔羽御邴泄為右冉求帥左師管周父御樊遲為右師及齊師戰于郊師入齊軍冉求之師獲甲首八十齊人不能師宵曰齊人遁冉有請從之季孫弗許孔子世家定公十三年秋季桓子病輦而見魯城喟然歎曰昔此國幾興矣以吾獲罪於孔子故不興也顧謂其嗣康子曰我即死若必相魯相魯必召仲尼後數日桓子卒康子代立已葬欲召仲尼公之魚曰昔我先君用之不終終為諸侯笑今又用之不能終是再為諸侯笑康子曰則誰召而可曰必召冉求於是使人召冉求冉求將行孔子曰魯人召求非小用之將大用之也是日孔子曰歸乎歸乎吾黨之小子狂簡斐然成章不知所以裁之子貢知孔子思歸送冉求因誡曰即用以孔子為招云冉求既去明年孔子自陳遷於蔡冉有為季氏餘見子罕篇是時四分魯國左傳昭公五年春正月季孫舍中軍卑公室也罷中軍季孫稱左師孟氏稱右師叔孫氏則自以叔孫為軍名初作中軍三分公室而各有其一三家各有一軍家屬季氏盡征之無所入於公叔孫氏臣其子弟以父兄歸公孟氏取其半焉復以子弟之半歸公及其舍之也四分公室季氏擇二簡擇取二分二子各一皆盡征之而貢于公國人皆屬三家三家隨時獻公而已四分公室家臣屢叛左傳定公五年九月陽虎囚季桓子及公父文伯文伯季桓子從父昆弟陽虎欲為亂恐二子不從故囚之而逐仲梁懷十月丁亥殺公何藐藐季氏族己丑盟桓子於稷門之內魯南城門庚寅大詛逐公父歜及秦遄皆奔齊歜即文伯也傳言季氏之亂八年季寤季桓子之弟公鉏極桓子族子公山不狃費宰皆不得志於季氏叔孫輒無寵於叔孫氏輒叔孫氏之庶子叔仲志不得志於魯志叔仲帶之孫故五人因陽虎陽虎欲去三桓以季寤更季氏以叔孫輒更叔孫氏已更孟氏虎自代懿子十月將享季氏于蒲圃而殺之陽虎前驅林楚御桓子以適孟氏陽虎劫公與武叔武叔州仇也以伐孟氏公斂處父帥成人自上東門入與陽氏戰于南門之內陽氏敗陽虎説甲如公宫取寶玉大弓以出入于歡陽關以叛哀公以越伐魯而去季氏左傳哀公二十七年公患三桓之侈也欲以諸侯去之欲求諸侯師以逐三桓三桓亦患公之妄也故君臣多間隙也公遊於陵阪遇孟武伯于孟氏之衢曰請有問於子余及死乎問已可得以夀死否對曰臣無由知之三問卒辭不對公欲以越伐魯而去三桓秋八月甲戌公如公孫有陘氏因孫于邾乃遂如越天下有道章諸侯不得變禮樂專征伐禮王制變禮易樂者為不從不從者君流流放也革制度衣服者為畔畔者君討討誅也有功德於民者加地進律律法也諸侯賜弓矢然後征賜鈇鉞然後殺祿之去公室章殺子赤立宣公左傳文公十八年文公二妃敬嬴生宣公敬嬴嬖而私事襄仲宣公長上聲而屬諸襄仲屬音燭襄仲欲立之叔仲不可叔仲惠伯也仲見于齊侯而請之齊侯新立而欲親魯許之冬十月仲殺惡及視襄仲殺太子惡及其母弟視而立宣公又曰桓子為家臣陽虎所執見前家臣屢叛下陽貨篇陽貨欲見孔子章揚雄謂孔子於陽貨也五伯篇或問聖人有詘乎詘與屈同曰有曰焉詘乎曰仲尼於南子所不欲見也於陽虎所不欲敬也見所不見敬所不敬不詘如何或曰衛靈公問陳則何以不詘曰詘身將以信與伸同道也如詘道而信身雖天下不可為也公山弗擾以費畔章弗擾與陽虎共執桓子據邑以叛左傳定公五年公山不狃為費宰季平子卒陽虎囚季桓子八年季寤公鉏極公山不狃皆不得志於季氏叔孫輒無寵於叔孫氏因陽虎欲去三桓以季寤更季氏叔孫輒更叔孫氏已更孟氏十二年仲由為季氏宰將墮三都叔孫氏墮郈季氏將墮費公山不狃叔孫輒帥費人襲魯公與三子入季氏之宫登武子之臺費人攻之弗克入及公側仲尼命申句須樂頎下伐之費人北國人追之敗諸姑蔑居吾語女章禮君子問更端則起而對曲禮上鄉原德之賊也章荀子原慤注讀作願是也正論篇上端誠則下原慤矣王能端莊誠實則下知謹願而純慤又詳見孟子卷苟患失之無所不至矣章吮癰舐痔莊子雜篇列御寇莊子曰秦王有病召醫破癰潰痤者癰壓疽之屬也得車一乘舐痔者痔漏下病也得車五乘所治愈下得車愈多子豈治其痔邪何得車之多也前漢佞幸傳文帝嘗病癰鄧通常為上嗽由角反吮之上不樂從容問曰天下誰最愛我者乎通曰宜莫若太子太子入問疾上使太子齰士客反癰齰齧也齧出其膿血太子齰癰而色難之已而聞通嘗為上齰之太子慙繇是心恨通繇與由同孺悲欲見孔子章孺悲嘗學士喪禮於孔子禮雜記下恤由之喪哀公使孺悲之孔子學士喪禮士喪禮於是乎書宰我問三年之喪章四時取火周禮夏官司爟古煥反掌行火之政令四時變國火以救時疾行猶用也變猶易也鄒子曰春取榆柳之火夏取棗杏之火夏季取桑柘之火秋取柞楢之火冬取槐檀之火季夏出火民咸從之季秋內火民亦如之父母之喪既殯食粥禮間傳父母之喪既殯音食粥未殯之前勺水不入於口既殯則三日矣故可食粥朝一溢米二十兩為一溢早膳時用一溢米為粥莫音暮一溢米齊衰之喪按家禮成服之日主人及兄弟食粥齊衰衣裳皆用極粗生布旁及下際不緝謂之斬衰緝則謂之齊衰疏食水飲疏食粗糲之飯不食菜果大功之喪不食醯醬可以食菜果矣小功緦麻五月三月之服不飲醴酒可以食醯醬矣父母之喪既虞卒哭疏食水飲可以不食粥矣不食菜果期而小祥期而服練謂之小祥食菜果又期而大祥再期而服縞謂之大祥有醯醬始得食醯醬矣中月而禫大感反即祥月之中而服禫禫而飲醴酒醴酒味薄故得食之始飲酒者先飲醴酒未忍享厚味也始食肉者先食乾肉未忍銜新品也賢者之情無窮也特以聖人為之中制不敢過故必俯而就之禮三年問君子三年之喪二十五月而畢若駟之過隙然而遂之是無窮也故先王為之中制檀弓子思曰先王之制禮過之者俯而就之不至焉者跂而及之故君子執親之喪水漿不入口者三日杖而後能起微子篇微子去之章微子去之箕子為之奴比干諫而死史記宋世家微子者殷帝乙之首子而紂之庶兄也紂既立不明淫亂於政微子數諫紂不聽微子度紂終不可諫欲死之及去未能自決乃問於太師少師太師曰今誠得治國國治身死不恨為死終不得治不如去遂亡箕子者紂親戚也紂始為象箸箕子歎曰彼為象箸必為玉杯為玉杯則必思逺方珍怪之物而御之矣輿馬宫室之漸自此始不可振也紂淫泆箕子諫不聽人或曰可以去矣箕子曰為人臣諫不聽而去是彰君之惡而自説於民吾不忍為也乃被髮佯狂而為奴遂隱而鼓琴以自悲故傳之曰箕子操王子比干者亦紂之親戚也見箕子諫不聽而為奴則曰君有過而不以死爭則百姓何辜乃直言諫紂紂怒曰吾聞聖人心有七竅信有諸乎乃遂殺王子比干刳視其心微子曰父子有骨肉而臣主以義屬故父有過子三諫不聽則隨而號之人臣三諫不聽則其義可以去矣於是太師少師乃勸微子去遂行周武王伐紂克殷微子乃持其祭器造於軍門肉袒面縛左牽羊右把茅膝行而前以告於是武王乃釋微子復其位如故齊景公待孔子曰章孔子去之事見世家史記孔子世家齊景公復問政於孔子曰政在節財景公説音悅將欲以尼溪田封孔子晏嬰進曰夫儒者滑稽而不可軌法滑稽索隱曰滑謂亂也稽同也以言辨捷之人言非若是説是若非能亂同異也言儒者滑稽而不為法度也倨傲自順不可以為下倨不遜也傲慢也言倨傲自不可屈下於人也崇喪遂哀破産厚葬不可以為俗遊説乞貸不可以為國自大賢之息周室既衰禮樂缺有間索隱曰息者生也言上古大賢生則有禮樂至周室微而始缺有間也今孔子盛容飾繁登降之禮趨詳之節纍世不能殫其學當年不能究其禮君欲用之以移齊俗非所以先細民也後景公數見孔子不問其禮異日景公止孔子曰奉子以季氏吾不能以季孟之間待之孔安國曰魯三卿季氏為正卿最貴孟氏為下卿不用事言待之以二者之間也齊大夫欲害孔子孔子聞之景公曰吾老矣弗能用也孔子遂行反乎魯齊人饋女樂章史記定公十四年孔子為魯司寇攝行相事孔子世家定公以孔子為中都宰一年四方皆則之由中都宰為司空由司空為大司寇定公十四年孔子年五十六由大司寇攝行相事有喜色門人曰聞君子禍至不懼福至不喜孔子曰有是言也不曰樂其以貴下人乎於是誅魯大夫亂政者少正卯與聞國政三月粥羔豚者弗飾賈男女行者别於塗塗不拾遺四方之客至乎邑者不求有司有司常供其職客求而有在也皆豫之以歸齊人聞而懼曰孔子為政必霸霸則吾地近焉我之為先并矣盍致地焉犁鉏曰請先嘗沮之沮之而不可則致地庸遲乎於是選齊國中女子好者八十人皆衣文衣而舞康樂文馬三十駟遺魯君陳女樂文馬於魯城南髙門外季桓子微服往觀再三將受乃語魯君為周道遊觀終日怠於政事子路曰夫子可以行矣見幾而作不俟終日易繫辭下子路從而後遇丈人以杖荷蓧章五榖不分猶言不辨菽麥爾左傳成公十八年晉欒書中行偃使程滑弒厲公葬之於翼東門之外以車一乘使荀罃士魴逆周子于京師而立之悼公周也生十四年矣逐不臣者七人周子有兄無慧不能辨菽麥故不可立菽大豆也豆麥殊形易别故以為癡者之候不慧蓋世所謂白癡逸民章少連稱其善居喪禮雜記下孔子曰少連大連善居喪三日不怠三月不解期悲哀三年憂東夷之子也仲雍居吳斷髮文身見泰伯下大師摯適齊章亞飯以下以樂侑食之官周禮春官大司樂王大食三宥音又皆令奏鐘鼓大食朔月月半以樂宥食時也宥猶勸也襄即孔子所從學琴者史記孔子世家孔子學鼓琴師襄子十日不進師襄子曰可以益矣孔子曰丘已習其曲矣未得其數也有間曰已習其數可以益矣孔子曰丘未得其志也有間曰已習其志可以益矣孔子曰丘未得其為人也有間曰有所穆然深思焉有所怡然髙望而逺志焉曰丘得其為人黯然而黑黯黑貌頎然而長詩云頎而長兮眼如望羊望羊視也心如王四國非文王其誰能為此也師襄子辟席再拜曰師蓋云文王操也子張篇君子有三變章如良玉溫潤而栗然禮聘義昔者君子比德於玉焉溫潤而澤仁也色柔溫潤似仁也縝音軫密以栗知也縝緻也栗堅也夫子之得邦家者章於變時雍書堯典堯曰篇堯曰咨爾舜章虞書大禹謨比此加詳天之厯數在汝躬汝終陟元后人心惟危道心惟微惟精惟一允執厥中無稽之言勿聽弗詢之謀勿庸可愛非君可畏非民衆非元后何戴后非衆罔與守邦欽哉慎乃有位敬修其可願四海困窮天祿永終惟口出好興戎朕言不再此引商書湯誥之辭王曰嗟爾萬邦有衆明聽豫一人誥惟皇上帝降𠂻于下民若有恆性克綏厥猷惟后夏王滅德作威以敷虐于爾萬方百姓爾萬方百姓罹其凶害弗忍荼毒並告無辜於上下神祗天道福善禍淫降災于夏以彰厥罪肆余小子將天命明威不敢赦敢用玄牡敢昭告于上天神后請罪有夏聿求元聖與之戮力以與爾有衆請命上天孚佑下民罪人黜伏天命弗僭賁若草木兆民允殖俾豫一人輯寧爾邦家茲朕未知獲戾于上下栗栗危懼若將隕于深淵凡我造邦無從匪彞無即慆淫各守爾典以承天休爾有善朕弗敢蔽罪當朕躬不敢自赦惟簡在上帝之心其爾萬方有罪在豫一人豫一人有罪無以爾萬方嗚呼尚克時忱乃亦有終夏尚黑禮檀弓上夏后氏尚黑大事斂用昏大事謂喪事戎事乘驪戎兵也馬黑色曰驪牲用玄殷人尚白大事斂用日中戎事乘翰翰色白馬也牲用白周人尚赤大事斂用日出戎事乘騵牲用騂武王克商大賚于四海周書武成賚所以錫豫善人詩周頌賚大封於廟也賚豫也言所以錫豫善人也興滅國繼絶世舉逸民章謂封黃帝堯舜夏商之後謂釋箕子之囚復商容之位史記武王克殷反商未及下車而封黃帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於杞投殷之後於宋封王子比干之墓釋箕子之囚使之行商容而復其位庶民弛政庶士倍祿濟河而西馬散之華山之陽而弗復乘牛散之桃林之野而弗復服車甲釁而藏之府庫而弗復用倒載干戈包之以虎皮將帥之士使為諸侯名之曰建櫜然後天下知武王之不復用兵也出納之吝謂之有司章項羽使人有功當封刻印刓忍弗能豫通鑑漢髙祖元年韓信問漢王曰今爭權天下豈非項王邪王曰然曰大王自料勇悍仁強孰與項王漢王良久曰不如也信曰信亦以為大王不如也然臣嘗事之請言其為人項王喑於金反噁烏故反叱昌力反吒竹駕反漢書作意烏猝嗟千人皆廢然不能任其賢將此特匹夫之勇耳項王見人恭敬慈愛言語嘔嘔凶于反悅言也漢書作姁音同人有疾病泣涕分飲食至使人有功當封爵者刻印刓五官反説缺忍不能豫此所謂婦人之仁也項王雖霸天下而臣諸侯不都關中而都彭城遷逐義帝所過無不殘滅名雖霸實失天下心故其強易弱今大王誠能反其道任天下武勇何所不誅以天下城邑封功臣何所不服以義兵從思東歸之士何所不散且三秦王為秦將將秦子弟數嵗矣欺其衆降諸侯至新安項王詐坑秦降卒二十餘萬唯獨邯欣翳得脫秦父兄怨此三人痛入骨髓今楚強以威王此三人秦民莫愛也大王入武關秋毫無所害除秦苛法秦民無不欲大王王秦者今大王舉而東三秦可傳檄而定也論語集注通證卷下
