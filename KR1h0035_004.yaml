body:
  text: 欽定四庫全書孟子集注通證卷下元張存中撰離婁下篇子産聽鄭國之政章十月成梁夏令曰九月除道十月成梁營室之中土功其始見國語諸葛武侯嘗言治世以大德不以小惠蜀志諸葛亮之相蜀也亮名孔明字也琅琊陽都人諡忠武侯有言公惜赦者亮答曰治世以大德不以小惠辟辟除也如周禮閽音昏人為之辟之辟周禮天官閽人主晨昏啓閉掌守王宫之中門之禁凡外內命夫命婦出入則為之闢闢開左右行者禮為舊君有服章儀禮曰以道去君而未絶者服齊衰三月喪服傳曰大夫為舊君何以服齊衰三月也大夫去君歸其宗廟故服齊衰三月也言與民同也何大夫之謂乎言其以道去君而猶未絶也如晉錮欒盈也春秋襄公二十一年秋晉欒盈出奔楚冬公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子子商任商任地闕任音壬左傳欒桓子娶于范宣子生懷子桓子欒黶懷子盈也范鞅以其亡也怨欒氏十四年欒黶强逐范鞅使奔秦故與欒盈為公族大夫而不相能桓子卒欒祁與其老州賔通欒祁桓子妻范宣子女盈之母也幾亡室矣懷子患之祁懼其討也訴諸宣子曰盈將為亂范鞅為之徴證其有此懷子好施士多歸之宣子畏其多士也信之懷子為下卿宣子使城著而遂逐之著晉邑在外易逐秋欒盈出奔楚冬㑹於商任錮欒氏也禁錮欒盈使諸侯不得受二十二年冬公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于沙隨左傳秋欒盈自楚適齊晏平仲言於齊侯曰商任之會受命於晉受錮欒氏之命今納欒氏將安用之小所以事大信也失信不立君其圖之弗聽冬會於沙隨復錮欒氏也晉知欒盈在齊故復錮也養生者不足以當大事章必誠必信不使少有後日之悔也禮檀弓上子思曰喪三日而殯凡附於身者必誠必信勿之有悔焉耳矣三月而葬凡附於棺者必誠必信勿之有悔焉耳矣王者之迹熄章謂黍離降為國風而雅亡也詩王黍離譜申侯與犬戎攻宗周殺幽王於戲晉文侯鄭武公迎太子冝臼於申而立之是為平王以亂故徙居東都王城於是王室之尊與諸侯無異其詩不能復雅故貶之謂之王國之變風必表年以首事左傳序故史之所記必表年以首事年有四時故錯舉以為所記之名也公羊傳作其辭則丘有罪焉爾昭公十二年春秋之信史也其序則齊桓晉文其會則主㑹者為之也其辭則丘有罪焉爾游夏不能贊一辭者也史記孔子世家孔子在位聽訟文辭有可與人共者弗獨有也至於為春秋筆則筆削則削子夏之徒不能贊一辭君子之澤五世而斬章四世而緦服之窮也禮大傳四世而緦服之窮也五世袒免音問殺去聲同姓也六世親屬竭矣逄蒙學射於羿章然夷羿篡弒之賊左傳襄公四年魏絳曰昔有夏之方衰也后羿自鉏遷於窮石因夏民以代夏政恃其射也不修民事而淫於原獸棄武羅伯因熊髠尨莫邦反圉而用寒浞土角反寒浞伯明氏之讒子弟也伯明后寒棄之夷羿收之信而使之以為已相浞行媚於內內宫人而施賂於外愚㺯其民而虞羿于田樹之詐慝以取其國家外內咸服羿猶不悛將歸自田家衆殺而烹之以食音嗣其子其子不忍食諸死于窮門靡奔有鬲氏靡夏遺臣事羿者有鬲國名今平原鬲縣是也浞因羿室就其妃妾生澆五弔反及豷恃其讒慝詐僞而不德于民使澆用師滅斟灌及斟尋氏二國夏同姓諸侯仲康之子后相所依樂安夀光縣東南有灌亭北海平壽縣東南有斟亭處澆于過古禾反處豷于戈過戈皆國名靡自有鬲氏收二國之燼燼遺民也以滅浞而立少康少康夏后相之子少康滅澆于過后杼滅豷于戈后杼少康子有窮由是遂亡天下之言性也章所謂天下之故者也易繫辭易無思也無為也寂然不動感而遂通天下之故所謂善言天者必有驗於人也荀子性惡篇善言天者必有徴於人以上古十一月甲子朔夜半冬至為歷元也新唐歷志治厯之本必推上元日月如合璧五星如連珠夜半甲子朔旦冬至自此七曜散行不復餘分普盡總㑹如初五代司天考夫天人之際逺哉微矣而使一藝之士布算積分上求數千萬嵗之前必得甲子朔旦夜半冬至而日月五星皆㑹于子謂之上元以為厯始蓋自漢而後其說始詳見于世其源流所自止於如此是果堯舜三代之法歟皆不可得而考矣然自是以來厯家之術雖世多不同而未始不本於此公行子有子之喪章周禮凡有爵者之喪禮春官宗伯職喪掌諸侯職喪者掌守諸侯之喪禮言諸侯者謂畿內王子毋弟得稱諸侯者及卿大夫士凡有爵者之喪以國之喪禮涖其禁令序其事萬章上篇萬章問曰舜往於田章事見虞書大禹謨篇見上卷禹拜昌言下史記云二女妻之以觀其內九男事之以觀其外五帝紀舜年二十以孝聞三十而帝堯問可用者四嶽咸薦虞舜曰可於是堯乃以二女妻七計反舜二女娥皇女英也娥皇無子女英生商均舜升天子娥皇為后女英為妃也以觀其內使九男與處以觀其外舜居媯汭內行彌謹媯源汭水出蒲州河東南山水涯曰汭按地記云河東青山東山中有二泉下南流者媯水北流者汭水二水異泉合流出谷西注河媯水北曰汭堯二女不敢以貴驕事舜親戚親戚謂父瞽叟後母弟象妹顆手等也甚有婦道堯九男皆益篤惇厚謹敬也楚詞戰國䇿所謂幼艾義與此同離騷九歌大司命孔蓋兮翠旍登九天兮撫彗音遂星慫息拱反長劒兮擁幼艾蓀獨冝兮為民正幼少也艾美好也戰國䇿趙孝成王篇建信君貴於趙公子魏牟過趙趙王迎之顧反至坐前有尺帛且令工人以為冠工見客來也因迎趙王曰公子乃驅後車幸以臨人願聞所以為天下魏牟曰王能重王之國若此尺帛則王之國大治矣趙王不說形於顔色曰先王不知寡人不肖使奉社稷豈敢輕國若此魏牟曰王無怒請為王說之曰王有此尺帛何不令前郎中以為冠王曰郎中不知為冠魏牟曰為冠而敗之奚虧於王之國而王必待工而后乃使之今為天下之工或非也社稷為虛戾先王不血食而王不以豫工乃與幼艾艾美好也伊尹以割烹要湯章伊尹欲行道以致君而無由乃為有莘氏之媵臣負鼎爼以滋味說湯致於王道史記殷紀阿衡欲干湯而無由阿衡即伊尹也乃為有莘氏媵康剩反臣負鼎爼以滋味說湯致於王道或曰伊尹處士湯使人聘迎之五反然後肯往從湯言素王及九主之事孔子於衛主癰疽章癰疽痬醫也周禮天官痬音羊醫痬創癰也掌腫痬潰痬金痬折時設反痬之祝之樹反藥劀音刖殺之齊才細反史記作顔濁鄒孔子遂行適衛月餘去衛適宋孔子世家定公十四年孔子適衛主於子路妻兄顔濁鄒家衛靈公問孔子居魯得祿幾何對曰奉粟六萬衛人亦致粟六萬居頃之或譖孔子孔子去衛將適陳過匡為匡入所拘孔子反乎衛主蘧伯玉家居衛月餘去衛適宋與弟子習禮大樹下百里奚自鬻於秦章晉欲伐虢左傳僖公二年晉荀息請屈産之乘與垂棘之璧假道於虞以伐虢荀惠荀叔也屈地生良馬垂棘出美玉故以為名四馬曰乘自晉適虢途出於虞故借道公曰是吾寶也對曰若得道於虞猶外府也公曰宫之竒存焉宫之竒虞忠臣對曰宫之竒之為人也懦而不能强諌懦弱也且少長於君君昵之雖諌將不聽親而狎之必輕其言乃使荀息假道於虞虞公許之且請先伐虢喜於厚賂而欲求媚宮之竒諌不聽遂起師夏晉里克荀息帥師會虞師伐虢滅下陽下陽虢邑在河東大陽縣五年晉侯復假道於虞以伐虢宫之竒諌曰虢虞之表也虢亡虞必從之晉不可啓寇不可玩玩習也一之謂甚其可再乎為二年假晉道滅下陽諺所謂輔車相依唇亡齒寒者其虞虢之謂也輔頰輔車牙車莊周曰百里奚爵祿不入於心放飯牛而牛肥莊子田子方篇百里奚爵祿不入於心姓孟字百里奚秦之賢士本是虞人虞被晉滅遂入秦國故飯牛而肥飯猶食之也使秦穆公忘其賤與之政也有虞氏死生不入於心故足以動人內自得者外自全也萬章下篇孔子之謂集大成章書所謂簫韶九成是也益稷篇聲宣也如聲罪致討之聲左傳莊公二十九年夏鄭侵許凡師有鍾鼓曰伐釋例曰鳴鍾鼓以聲其過曰伐謂鳴鍾鼓聲其罪往討伐之若擊鼓斬木然無曰侵輕曰襲玉終詘然也禮聘義昔者君子比德於玉焉溫潤而澤仁也縝密以栗知也亷而不劌義也劌傷音鱖垂之如隊直位反禮也叩之其聲清越以長其終詘其物反然樂也欒作則有聲止則無也越猶揚也詘絶止貌也故兒寬云惟天子建中和之極兼總條貫金聲而玉振之前漢兒五奚反寬封禪對寬千乘人惟天子建中和之極兼總條貫金聲而玉振之以順成天慶垂萬世之基北宫錡問章通謂之附庸若春秋邾儀父之類是也隱公元年三月公及邾儀父盟於蔑府史胥徒也周禮天官冡宰大宰卿一人小宰中大夫二人府六人史十有二人府治藏史掌書者凡府史皆其官長所自辟除胥十有二人徒百有二十人此民給搖後者若今衛士矣胥讀如諝謂其有才知為什長愚按此章之說與周禮王制不同周禮地官司徒凡建邦國以土圭土其地而制其域諸公之地封疆方五百里其食者半諸侯之地封疆方四百里其食者參之一諸伯之地封疆方三百里其食者參之一諸子之地封疆方二百里其食者四之一諸男之地封疆方百里其食者四之一土其地猶言度其地禮王制王者之制祿爵公侯伯子男凡五等諸侯之上大夫卿下大夫上士中士下士凡五等天子之田方千里公侯田方百里伯七十里子男五十里不能五十里者不合於天子附於諸侯曰附庸天子之三公之田視公侯天子之卿視伯天子之大夫視子男天子之元士視附庸制農田百畝百畝之分上農夫食九人其次食八人其次食七人其次食六人下農夫食五人庶人在官者其祿以是為差也諸侯之下士視上農夫祿足以代其耕也中士倍下士上士倍中士下大夫倍上士卿四大夫祿君十卿祿次國之卿三大夫祿君十卿祿小國之卿倍大夫祿君十卿祿士之不託諸侯何也章謂之寄公禮郊特牲諸侯不臣寓公故古者寓公不繼世寓寄也寄公之子非賢者世不足尊也喪大記君之喪未小斂為寄公國賔出敢問不見諸侯何義也章田獵之冠也事見春秋傳左傳昭公二十年十二月齊侯田於沛沛澤名招虞人以弓不進公使執之辭曰昔我先君之田也旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之齊宣王問卿章然三仁貴戚不能行之於紂而霍光異姓乃能行之於昌邑三仁見論語微子篇下前漢霍光傳光字子孟栗騎將軍諡宣成侯去病弟也父中孺河東平陽人也昌邑王賀武帝孫昌邑哀王子也即位行淫亂光憂悶音滿又音悶獨以問所親故吏大司農田延年延年曰將軍為國柱石審此人不可何不建白太后更選賢而立之光曰今欲如是於古嘗有此不延年曰伊尹相殷廢太甲以安宗廟世稱其忠將軍若能行此亦漢之伊尹也光乃引延年給事中隂與車騎將軍張安世圖計光與羣臣俱見白太后具陳昌邑王不可以承宗廟狀皇太后乃車駕幸未央承明殿召昌邑王伏前聼詔光與羣臣連名奏王尚書令讀畢光令王起拜受詔乃即持其手解脫其璽組扶王下殿送至昌邑邸已而光奉上皇帝璽綬謁於高廟是為孝宣皇帝衛太子孫號皇曽孫告子上篇性猶杞柳也章荀子性惡之說也見序說性猶湍水也章揚子善惡混之說見序說告子曰性無善無不善也章近世蘇氏胡氏之說東坡蘇氏曰夫善惡者性之所能之而非性之所能有也且夫言性者安以其善惡為哉雖然揚雄之論則固已近之曰人之性也善惡混修其善則為善人修其惡則為惡人此其所以為異者惟其不知性之不能以有夫善惡而以為善惡之皆出乎性也而已夫太古之初夲非有善惡之諭唯天下之所同安者聖人指以為善而一人之所獨樂者則名以為惡天下之人固將即其所樂而行之孰知夫聖人唯其一人之獨樂不能勝天下之所同安是以有善惡之辨而諸子之意將以善惡為聖人之私說不已踈乎或問性曰性也者天地之所以立也五峯胡氏曰然則孟子氏荀卿氏揚雄氏之以善惡言性也非歟曰性也者天地鬼神之奧也善不足以言之况惡乎或者問曰何謂也曰宏聞之先君子曰孟子所以獨出諸儒之表者以其知性也宏請曰何謂也先君子曰孟子道性善善云者歎美之詞不與惡對韓子性有三品之說原性性也者與其生俱生也情也者接於物而生也性之品有三而其所以為性者五情之品有三而其所以為情者七何也曰性之品有上中下三上焉者善焉而已矣中焉者可導而上下也下焉者惡焉而已矣趙孟之所貴趙孟能賤之章趙孟晋卿也能以爵祿與人而使之貴則亦能奪之而使之賤通鑑綱目威烈王二十三年初命晋大夫魏斯趙籍韓虔為諸侯愚按分注趙烈侯好音謂相國公仲連曰寡人有愛可以貴之乎連曰富之可貴之則否君曰然鄭歌者槍石二人吾賜之田人萬畝連諾而不與烈侯屢問連乃稱疾不朝畨吾君謂連曰君實好善而未知所持公仲亦有進士乎連曰未也曰牛畜荀欣徐越皆可連進之畜侍以仁義烈侯逌然明日欣侍以舉賢使能明日越侍以節財儉用察度功德所與無不充君說乃謂連曰歌者之田且止以畜為師欣為中尉越為內史賜連衣二襲此非能使歌者貴能使歌者賤歟又按豫讓欲為智伯報仇吞炭漆身其友為之泣曰以子之才臣事趙孟必得近幸子乃為所欲為顧不易邪何乃自苦如此是指趙襄子也襄子有子五人不肯置後立伯魯之孫完是為獻子獻子生藉是為烈侯然則趙孟晋卿也自襄子至烈侯之通稱乎告子下篇紾兄之臂而奪之食章亦未嘗膠柱而調瑟史記亷頗藺相如傳趙孝成王七年秦與趙兵相距長平時趙使亷頗將兵固壁不戰王信秦之間言使趙括為將代亷頗藺相如曰王以名使括若膠柱而鼓瑟耳瑟樂器也每一絃有一柱旋移變而取音聲之和今以膠定其柱不使變移而鼓之豈能得之和括徒能讀其父書傳不知合變也宋牼將之楚章按莊子書有宋鈃者刑堅二音天下篇不纍於俗不飾於物不苟於人不音忮逆也於衆願天下之安寧以活民命人我之飬畢足而止以此白心古之道術有在於是者宋鈃尹文聞其風而悅之作為華山之冠以自表接萬物以别宥為始語心之容命之曰心之行以聏而鉗二音令也合歡以調海內請欲置之以為主見侮不辱救民之鬬禁攻寢兵救世之戰以此周行天下上說下教雖天下不取强聒而不舍者也先名實者為人也章華周杞梁二人皆齊臣戰死於莒其妻哭之哀左傳襄公二十三年齊侯襲莒杞殖市力反華還華去聲還音旋載甲夜入且於之隧宿於莒郊明日先遇莒子於蒲侯氏莒子重賂之使無死曰請有盟華周對曰貪貨棄命亦君所惡也昏而受命日未中而棄之何以事君莒子親鼓之從而伐之獲杞梁莒人行成齊侯歸遇杞梁之妻於郊梁戰死妻行迎喪使弔之辭曰殖之有罪何辱命焉若免於罪猶有先人之敝廬在下妾不得與郊弔齊侯弔諸其室劉向說苑齊莊公攻莒杞梁與莒戰梁遂鬬殺二十七人而死妻聞而哭城為之陀而隅為之崩五霸者三王之罪人也章按春秋傳僖公九年葵丘之會陳牲而不殺榖梁傳僖公九年九月戊辰諸侯盟於葵丘桓盟不日此何以日美之也為見天子之禁故備之也葵丘之盟陳牲而不殺盟牲諸侯用牛大夫用豭讀書加於牲上一明天子之禁一猶專也曰無壅泉專水利毋訖糴訖止也毋易樹子樹子嫡子毋以妾為妻毋以婦人與國事與音預白圭曰吾欲二十而取一章按史記白圭能薄飲食忍耆欲前漢白圭周人也當魏文侯時李克務盡地力而白圭樂觀時變故人棄我取人取我豫能薄飲食忍嗜欲節衣服與用事僮僕同苦樂趨時若猛獸鷙鳥之發古之君子何如則仕章故與公遊於囿公仰視蜚㕍而後去之史記孔子世家孔子反衛主蘧伯玉家靈公問陳孔子曰俎豆之事則嘗聞之軍旅之事未之學也明日與孔子語見蜚㕍仰視之色不在孔子孔子遂行復如陳盡心上篇霸者之民歡虞如也章耕田鑿井帝力何有於我帝王通厯帝堯之時有老人擊壤於路風土記云擊壤者以木為之長三四寸其形如履臘節撞少以為戲分部以擲博也將戲先側一壤於地遙於三四十步以手中壤擲之中者為上曰吾日出而作日入而息鑿井而飲耕田而食帝力於我何哉楊子取為我章列子稱其言曰伯成子髙不以一毫利物是也楊朱篇楊子曰伯成子髙不以一毫利物舍國而隱大禹不以一身自利一體偏枯古之人損一毫利天下不與也悉天下奉一身不取也人人不損一毫人人不利天下天下治矣禽子問楊朱曰去子體之一毛以濟一世汝為之乎楊朱曰世固非一毛之所濟禽子曰假濟為之乎楊子弗聽恭敬者幣之未將者也章詩曰承筐是將小雅鹿鳴章吹笙鼓簧承筐是將人之好我示我周行形色天性也章踐如踐言之踐禮曲禮修身踐言謂之善行又曰天生蒸民有物有則詩大雅蒸民章天生蒸民有物有則民之秉彞好去聲是懿德齊宣王欲短喪章按儀禮公子為其母練冠麻衣縓緣縓取絹反儀禮喪服章記公子為其母練冠麻衣縓緣為其妻縓冠葛絰帶麻衣縓緣皆既葬除之公子君之庶子也其或為母謂妾子也天下有道以道殉身章殉如殉葬之殉禮檀弓下陳子車死於衛其妻與其家大夫謀以殉音徇葬定而後陳子亢至以告曰夫子疾莫飬去聲下同於下請以殉葬子亢曰以殉葬非禮也雖然則彼疾當飬者孰若妻與宰得已則吾欲已不得已則吾欲以二子者之為之也於是弗果用盡心下篇梓匠輪輿章莊周所論斫輪之意莊子天道篇桓公齊君名小白讀書於堂上輪扁音篇匠氏名斫輪於堂下釋椎鑿而上問桓公曰敢問公之所讀者何言邪公曰聖人之言也曰聖人在乎公曰已死矣曰然則君之所讀者古人之糟魄普各反已夫桓公曰寡人讀書輪人安得議乎有說則可無說則死輪扁曰臣也以臣之事觀之斫輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應之於心口不能言有數存焉於其間臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老斫輪古之人與音余其不可傳也死矣然則君之所讀者古人之糟魄已夫社稷次之章立壇壝以祀之周禮地官大司徒設其社稷之壝而樹之田主各以其野之所宜木遂以名其社與其野封人掌設王之社壝為畿封而樹之聚土曰封壝謂壇及堳埓也按白虎通曰天子社壇方五丈取五方五色土封之諸侯半之各以其所守之方一色土封之皆冒以黃土今通制所議社壇自天子至大夫士一也無降殺與古制稍異年不順成八蠟音乍不通之意禮郊特牲天子大蠟八伊耆音其氏始為蠟蠟也者索也索音色歲十二月合聚萬物而索饗之也蠟之祭也主先嗇音色而祭司嗇先嗇田祖也祭百種上聲以報嗇也饗農及郵音尤表畷丁劣反禽獸饗亦祭也農為先農也郵表畷田官督約農事之所也禽獸能為田除害也仁之至義之盡也古之君子使之必報之迎貓音苗為其食田鼠也迎虎為其食田豕也迎而祭之也迎其神而祭之祭坊與水庸坊以止水庸以通水事也以其事於我而祭之八蠟以記四方四方年不順成八蠟不通不與諸方相通而祭以謹民財也順成之方其蠟乃通以移民也既蠟而收民息已故既蠟君子不興功稽大不理於口章今按漢書無俚方言前漢季布贊賢者誠重其死夫婢妾賤人感槩而自殺非能勇也其畫無俚之至耳晋灼曰揚雄方言曰俚聊也許慎曰賴也曰以追蠡章追音堆蠡音禮周禮所謂旋蟲冬官鳬氏為鍾兩欒謂之銑銑間謂之于于上謂之鼓鼓上謂之鉦鉦上謂之舞舞上謂之甬甬上謂之衡鍾縣謂之旋旋蟲謂之幹旋屬鍾柄所以縣之也旋蟲者旋以蟲為飾也今時旋有蹲熊盤龍辟邪城中之涂容九軌周禮冬官下匠人營國方九里旁三門國中九經九緯經涂九軌國中城內也經緯謂涂也經緯之涂皆容方九軌凡八尺為軌廣九軌積七十二尺則此涂十二步也充實而有光輝之謂大章美在其中而暢於四支發於事業易坤卦文言曰君子黃中通理正位居體美往其中而暢於四支發於事業美之至也言近而指逺者章古人視不下於帶禮曲禮下天子視不上於祫音劫不下於帶凡視上於面則傲下於帶則憂傾則姦如琴張曽晳牧皮者章子桑户死琴張臨其喪而歌事見莊子大宗師子桑户孟子反子琴張三人相與為友莫然有間而子桑户死未葬孔子聞之使子貢往行事焉或編曲或鼓琴相和而歌曰嗟來桑户乎而已反其真而我猶為人猗音依子貢趨而進曰敢問臨尸而歆禮乎二人相視而笑曰是惡平聲知禮意季武子死曽晳倚其門而歌禮檀弓下季武子寢疾及其喪也曽晳倚門而歌荀子原慤音殼字皆讀作願榮辱篇孝悌願慤以敦比其事業富國篇其臣主百吏汙者皆化而修悍者先化而願躁者先化而慤是明主之功已正論篇上端誠則下原殼矣上公正則下易直矣治辨則易一願殼則易使閹然媚於世也者章閹音奄如奄人之奄周禮春官守祧他堯反奄於檢反八人女祧每廟二人奚四人孟子集注通證卷下欽定四庫全書中庸章句或問通證元張存中撰章句序人心惟危道心惟微惟精惟一允執厥中者書大禹謨傳十章詩曰矯矯虎臣是也泮水明明魯侯克明其德既作泮宫淮夷攸服矯矯虎臣在泮獻馘古獲反淑問如臯陶在泮獻囚矯矯武貌傳十一章至十七章素按漢書當作索前漢藝文志孔子曰索隱行怪後世有述焉吾弗為之矣師古曰禮記載孔子之言索隱求索隱暗之事而行怪迂之妄令後人有所祖述非我本志弗為之矣恥之也如孔子問禮問官之類家語觀周篇孔子謂南宫敬叔曰敬叔孟僖子子也吾聞老𣆀他甘反博古知今則吾師也今將往矣敬叔與俱至周問禮於老𣆀左傳昭公十七年秋郯子來朝公與之晏昭子問焉曰少皥氏鳥名官何故也郯子曰吾祖也我知之昔者黃帝氏以雲紀故為雲師而雲名炎帝氏以火紀故為火師而火名共工氏以水紀故為水師而水名太皡氏以龍紀故為龍師而龍名我髙祖少皥摯音至之立也鳯鳥適至故紀於鳥為鳥師而鳥名鳳鳥氏厯正也𤣥鳥氏司分者也𤣥鳥燕也以春分來秋分去伯趙氏司至者也伯趙伯勞也以夏至鳴冬至止青鳥氏司啓者也青鳥鶬鶊也以立春鳴立夏止丹鳥氏司閉者也丹鳥鷩雉也以立秋來立冬去入大水為蜃上四鳥皆厯正之屬官祝鳩氏司徒也祝鳩鷦鳩也鷦鳩孝故為司徒主教民鷦音焦鴡本作雎鳩氏司馬也雎鳩王鴡也鷙而有别故為司馬主法制鳲鳩氏司空也鳲鳩鴶鵴也鳲鳩平均故為司空平水土鴶音戞鵴音菊爽鳩氏司寇也爽鳩鷹也鷙故為司寇主盜賊鶻鳩氏司事也鶻鳩鶻鵰也春來冬去故為司事五鳩鳩民者也鳩聚也治民法聚故以鳩為名五雉為五工正五雉雉有五種西方曰鷷雉東方曰鵰雉南方曰翟雉北方曰鵗雉伊洛之南曰翬雉利器用正度量夷民者也夷平聲九扈為九農正扈有九種也春扈鳻夏扈竊𤣥秋扈竊藍冬扈竊黃棘扈竊丹行扈唶唶宵扈嘖嘖桑扈竊脂老扈鷃鷃以九扈為九農之號各隨土宜以教民事賈逵云春扈分循相五土之宜趣民耕種者也夏扈竊𤣥趣民耘苖者也秋扈竊藍趣民收斂苖者也冬扈竊黃趣民蓋藏者也棘扈竊丹為巢驅鳥者也行扈唶唶晝為民驅鳥者也宵扈嘖嘖夜為農驅獸者也桑扈竊脂為蠶驅雀者也老扈鷃鷃趣收麥令不得晏起者也扈民無淫者也扈止也止民使不淫放自顓頊以來不能紀逺乃紀於近為民師而命以民事則不能故也仲尼聞之見於郯子而學之於是仲尼年二十八既而告人曰吾聞之天子失官學在四夷猶信違去也如春秋傳齊師違榖七里之違左傳哀公二十七年晉荀瑶帥師伐鄭荀瑶即智襄子次于桐丘鄭駟𢎞請於齊乃救鄭及留舒齊地違榖七里榖人不知及濮水名智伯聞之乃還曰我卜伐鄭不卜敵齊猶易所謂幹事乾卦文言貞者事之幹也貞固足以幹事孔子曰其氣發揚于上為昭明焄蒿悽愴此百物之精也神之著也詳見後子孫謂虞思陳胡公之屬左傳哀公元年夏后少康逃奔有虞夏后相啓孫也少康相之遺腹子也寒浞子澆滅夏后相使臣椒求少康欲殺之少康逃奔有虞有虞虞舜後為諸侯者少康逃而歸之也虞思於是妻去聲之以二姚思有虞君也虞思自以二女妻少康姚虞姓也而邑諸綸綸虞邑有田一成有衆一旅方十里為成五百人為旅左傳襄公二十五年晉人問陳之罪鄭子産獻入陳之功于晉晉人詰問子産以何罪伐陳對曰昔虞閼父為周陶正虞閼父舜之後以服事我先王我先王賴其利器用也與其神明之後也庸以元女大姬配胡公庸用也元女武王之長女胡公閼父之子滿也是用以武王之長女曰大姬者與閼父之子胡公為配耦按史記陳世家云陳胡公滿者虞帝舜之後也舜傳禹而舜子商均為封國夏后之時或失續周武王克商求舜後得媯滿封之於陳以奉帝舜祀是為胡公而封諸陳以備三恪苦洛反周分天下封夏殷二王後又封舜後謂之恪并二王後為三國其禮轉降示敬而已故謂三恪則我周之自出至於今是賴舜年百有十歲書舜典舜生三十徴庸三十在位五十載陟方乃死書云大王肇基王迹武成王若曰嗚呼羣后惟先王建邦啓土公劉克篤前烈至于太王肇基王迹王季其勤王家詩云至于大王實始翦商閟宫后稷之孫實維大音太王居岐之陽實始翦商至于文武纘大王之緒致天之屆于牧之野傳十八章先公組紺以上至后稷也史記周本紀后稷别姓姬氏后稷卒子不窋立不窋卒子鞠陶立鞠陶卒子公劉立公劉卒子慶節立國於豳慶節卒子皇僕立皇僕卒子差弗立差弗卒子毁隃立毁隃卒子公非立公非卒子髙圉立髙圉卒子亞圉立亞圉卒子公叔祖類立索隱曰世本云大公組紺諸盩三代世表稱叔類凡四名皇甫謐云公祖一名組紺諸盩字叔類號曰太公也公叔祖類卒子古公亶父立傳十九章祖廟天子七諸侯五大夫三適士二官師一禮王制天子七廟三昭三穆與太祖之廟而七此周制七者太祖及文王武王之祧與親廟四太祖后稷殷則六廟契及湯與二昭二穆夏則五廟無太祖禹與二昭二穆而已諸侯五廟二昭二穆與太祖之廟而五太祖始封之君王者之後不為始封之君廟大夫三廟一昭一穆與太祖之廟而三太祖别子始爵名大傳曰别子為祖謂此雖非别子始爵者亦然士一廟謂諸侯之中士下士名曰官師者上士二廟庶人祭於寢寢適寢也祭法適士二廟一壇曰考廟曰王考廟享嘗乃止顯考無廟官師一廟曰考廟王考無廟若周之赤刀大訓天球河圖之屬也書顧命越玉五重陳寶赤刀赤削也武王誅紂時以赤為飾大訓三皇五帝之書訓誥亦在焉文武之訓亦曰大訓𢎞璧琬琰在西序大玉夷玉天球鳴球維州之玉河圖伏羲時龍馬負圖出於河一六位北二七位南三八位東四九位西五十居中者是也在東序如春行羔豚膳膏香之類周禮天官冢宰庖人凡用禽獸煎和之以獻王春行羔豚行猶用也羔羊子豚豕子膳膏香膳治也膳膏香謂治羔豕以牛脂夏行腒音渠鱐音搜腒乾雉鱐乾魚膳膏臊治腒鱐以犬膏秋行犢麛音迷犢牛子麛鹿子膳膏腥治犢麛以雞膏冬行鮮音鮮羽鮮魚也羽鴈也膳膏羶治鮮羽以羊脂嘗秋祭也四時皆祭舉其一耳禮王制天子諸侯宗廟之祭春曰礿夏曰禘秋曰嘗冬曰蒸此蓋夏殷之祭名周則改之春曰祠夏曰礿以禘為殷祭詩小雅曰礿祠蒸嘗于公先王此周四時祭宗廟之名祭統凡祭有四時春祭曰礿夏祭曰禘秋祭曰嘗冬祭曰蒸謂夏殷時禮也傳二十章家語作為政在於得人詳見後所謂皇建其有極是也書洪範五皇極皇建其有極餼禀稍去聲食也周禮天官宫正幾其出入均其稍食內宰掌書版圖之法以治王內之政令均其稍食分其人民以居之稍食吏祿廪也如周禮槀人職曰考其弓弩以下上其食是也夏官槀人掌受財于職金以齎音咨其工弓六物為三等弩四物亦如之矢八物皆三等箙亦如之箙盛矢器以獸皮為之春獻素秋獻成書其等以饗工乘其事試音考其弓穹以下上其食而誅賞乃入功于司弓矢及繕人槀讀為芻槀之槀箭幹謂之槀今以鹵莽滅裂之學莊子則陽篇長梧封人問子牢曰君為政焉勿鹵莽鹵莽不用心也治民焉勿滅裂滅裂輕薄也昔豫為禾耕而鹵莽之則其實亦鹵莽而報豫藝而滅裂之其實亦滅裂而報豫又按孔子家語亦載此章而其文尤詳哀公問政於孔子孔子對曰文武之政布在方䇿其人存則其政舉其人亡則其政息天道敏生人道敏政地道敏樹夫政也者猶蒲盧也待化以成故為政在於得人取人以身修道以仁仁者人也親親為大義者宜也尊賢為大親親之殺尊賢之等禮所以生也禮者政之本也是以君子不可以不修身思修身不可以不事親思事親不可以不知人思知人不可以不知天天下之達道有五其所以行之者三曰君臣也父子也夫婦也昆弟也朋友也五者天下之達道智仁勇三者天下之達德也所以行之者一也或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉强而行之及其成功一也公曰子之言美矣至矣寡人實固不足以成之也孔子曰好學近乎智力行近乎仁知恥近乎勇知斯三者則知所以修身知所以修身則知所以治人知所以治人則能成天下國家者矣公曰政其盡此而已乎孔子曰凡為天下國家有九經曰修身也尊賢也親親也敬大臣也體羣臣也重庶民也來百工也柔逺人也懷諸侯也夫修身則道立尊賢則不惑親親則諸父兄不怨敬大臣則不眩體羣臣則士之報禮重子庶民則百姓勸來百工則財用足柔逺人則四方歸之懷諸侯則天下畏之公曰為之奈何孔子曰齊明盛服非禮不動所以修身也去讒逺色賤利而貴德所以尊賢也爵其能重其祿同其好惡所以篤親親也官盛任使所以敬大臣也忠信重祿所以勸士也時使薄斂所以子百姓也日省月考餼禀稱事所以來百工也送往迎來嘉善而矜不能所以綏逺人也繼絶世舉廢邦治亂持危朝聘以時厚往而薄來所以懷諸侯也治天下國家有九經其所以行之者一也凡事豫則立不豫則廢言前定則不跲躓也事前定則不困行前定則不疚道前定則不窮在下位不獲于上民弗可得而治矣獲于上有道不信于友不獲于上矣信于友有道不順于親不信于友矣順于親有道反諸身不誠不順于親矣誠身有道不明于善不誠于身矣誠者天之道也誠之者人之道也夫誠弗勉而中不思而得從容中道聖人之所以定體也誠少者擇善而固執之者也公曰子之教寡人備矣敢問行之所始孔子曰立愛自親始教民睦也立敬自長始教民順也教以慈睦而民貴有親教以敬長而民貴用命民既孝于親又順以聽命措諸天下無所不可公曰寡人既得聞此言也懼不能果行而獲罪咎傳二十四章二十六章如執玉髙卑其容俯仰之類見論語先進下傳二十七章溫猶燖溫之溫左傳哀公十二年公㑹吳于槖臯吳子使太宰嚭請尋盟公不欲使子貢對曰盟所以周信也今吳子曰必尋盟若可尋也亦可寒也尋溫也前盟已寒更溫之使熱尋亦作燖杞夏之後史記杞世家東樓公者夏后禹之後苖裔也索隱曰杞國名東樓公諡號也杞今陳留雍丘縣故杞國周武王封禹後為東樓公是也蓋周封杞而居雍丘至春秋時杞已遷東國杞後改國號州而稱淳于公故春秋桓五年經云州公如曺傳曰淳于公如曺是也然杞後代又稱子者以微小又僻居東夷故襄二十九年經稱杞子來盟宋殷之後史記宋世家微子開者孔安國曰微畿內國名子爵也為紂卿士索隱曰按尚書微子之命篇云命微子啓代殷後今此名開者避漢景帝諱也殷帝乙之首子而紂之庶兄也索隱曰按尚書亦以為殷王元子而是紂之兄吕氏春秋云生微子時母猶為妾及為妃而生紂微子紂同母庶兄或問經一章虎狼之父子蜂蟻之君臣豺獺之報本雎鳩之有别莊子天運篇商大宰蕩問仁於莊子大宰官名商人名承字蕩莊子曰虎狼仁也曰何謂也莊子曰父子相親何為不仁化書曰蜂有君禮也蜂有兩衙應朝其主之所在衆蜂為之旋繞如衙誅罰徴令絶嚴有君臣之義螻蟻之有君也一拳之宫與衆處之一塊之臺與衆臨之一粒之食與衆蓄之一蟲之肉與衆咂之一罪無疑與衆戮之禮月令季秋之月豺乃祭獸戮禽豺說文狼屬狗聲捕獸祭天孟春之月魚上氷獺祭魚說文獺獸名水居魚可取祭而後食雎鳩按詩傳云雎鳩水鳥一名王雎狀類鳬鷖今江淮間有之生有定偶而不相亂偶常並遊而不相狎故毛傳以為摯而有别摯字與至通言其情意深至也書之言防怨而曰不見是圖禮之言事親而曰聽於無聲視於無形五子之歌一人三失怨豈在明不見是圖禮曲禮凡為人子者居不主奧坐不中席行不中道立不中門食饗不為槩祭祀不為尸聽於無聲視於無形胎殰卵殈禮樂記天地欣熙音反合隂陽相得煦許句反嫗於句反覆去聲育萬物然後草木茂區古侯反萌達羽翼奮發也角觡古伯反生無䚡曰觡生出也蟄蟲昭蘇昭曉也蘇醒也羽者嫗伏毛者孕鬻胎生者不殰音獨殰內敗也而卵生者不殈呼閴反殈謂裂也則樂之道歸焉耳莊周出怒不怒之言莊子庚桑楚篇敬之而不喜侮之而不怒者唯同乎天和者為然出怒不怒則怒出於不怒矣出為無為則為出于無為矣傳之首章至十二章漢之胡廣唐之吕溫栁宗元者胡廣廣字伯始南郡華容人也位至太傅時年八十而心力克壯性溫厚謹素常遜言恭色達練事體明解朝章雖無謇直之風屢有補闕之益故京師諺曰萬事不理問伯始天下中庸有胡公吕溫溫字和叔一字化光從陸質治春秋貞元末擢進士第後進户部貟外郎文藻精富一時推尚性險躁譎詭好利妄言宰相李吉甫隂事憲宗貶均州再貶道州後徙衡州栁宗元宗元字子厚河東人少精敏絶倫為文章卓偉精緻一時輩行推仰第進士博學𢎞辭科授校書郎後遭貶栁州刺史七聖皆迷莊子徐無鬼章黃帝將見大隗音嵬乎具茨音慈之山方明為御昌㝢驂乘張若謵傷涉反朋馬前昆閽滑音骨稽後車至于襄城之野七聖皆迷七聖者方明昌㝢張若謵朋昆閽滑稽及黃帝也此六名皆寓言迷失具茨之道無所問途傳十五章孔子所以告宰豫者見於祭義之篇禮祭義宰我曰吾聞鬼神之名不知其所謂子曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也衆生必死死必歸土此之謂鬼骨肉斃于下隂為野土其氣發揚於土為昭明焄蒿悽愴此百物之精也神之著也因物之精制為之極明命鬼神以為黔首則百衆以畏萬民以服聖人以是為未足也築為宫室設為宗祧以别親踈逺邇教民反古復始不忘其所由生也衆之服自此故聽且速也二端既立報以二禮建設朝事燔燎羶薌見以蕭光以報氣也此教衆反始也薦黍稷羞肝肺首心見間以夾甒甒瓦尊也加以鬱鬯以報魄也教民相愛上下用情禮之至也君子反古復始不忘其所由生也是以致其敬發其情竭力從事以報其親不敢弗盡也易大傳所謂精氣為物遊魂為變繫辭上原始反終故知死生之說精氣為物遊魂為變是故知鬼神之情狀書所謂徂落者亦以其升降舜典二十有八載帝乃徂落魂氣升于天曰徂體魄降于地曰落傳十九章尸必以孫禮祭統夫祭之道孫為王父尸王父祖也所使為尸者於祭者子行也父北面而事之所以明子事父之道也此父子之倫也叔孫通之舞禮孝明之亂命前漢叔孫通傳叔孫通薛人也事髙惠二帝孝惠即位惠帝諱盈之字曰滿髙帝太子也母曰髙皇后乃謂通曰先帝園陵寢廟羣臣莫習徙通為奉常定宗廟儀法又稍定漢諸儀法皆通所論著也惠帝為東朝長樂宫及閒往數蹕煩民乃作復道方築武庫南通奏事因請閒曰陛下何自築復道髙帝寢衣冠月出游髙廟子孫奈何乘宗廟道上行哉惠帝懼曰急壞之通曰人主無過舉今已作百姓皆知之矣願陛下為原廟渭北衣冠月出游之益廣宗廟大孝之本上乃詔有司立原廟後漢明帝紀帝諱莊字嚴光武第四子也母隂皇后十八年秋八月壬子帝崩於東宫前殿年四十八遺詔無起寢廟藏主於光烈皇后更衣别室掃地而祭杅水脯糒而已過百日唯四時設奠置吏卒數人供給灑掃勿開修道敢有所興作者以擅議宗廟法從事前書曰擅議宗廟者棄市傳二十章至二十八章賈捐之所謂後宫盛色前漢賈捐之傳捐之字君房賈誼之曽孫也元帝初元元年珠崖又反發兵擊之里崖在南方海中洲居廣袤可千里合十六縣户二萬三千餘詰問捐之捐之對其略曰至孝文皇帝閔中國未安偃武行文逸遊之樂絶竒麗之賂塞鄭衛之倡微矣夫後宫盛色則賢者隱處佞人用事則諍臣杜口而文帝不行其或不幸而有趙髙朱异虞世基李林甫之徒焉趙髙生而隱宫宦人也秦始皇時人二世時官至丞相恃恩専恣以私怨殺人擅利亶害指鹿為馬殺二世望夷宫子嬰殺之於齊宫朱异字彥和吳郡錢塘人梁武帝時官至中領軍貪財冒賄欺罔視聽所以伺候人主意不肯進賢黜陟蔑弄朝權輕作威福死贈尚書右僕射虞世基字茂世㑹稽餘姚人隋煬帝朝官至金紫光祿大夫參掌朝政鬻官賣獄賄賂公行金寶委積陷主令宇文化及弒逆世基亦見害李林甫長平肅王叔良曽孫唐𤣥宗朝官至中書令封晉國公性隂密忍誅殺排搆大臣蕩覆天下固寵市權蔽欺天子耳目死賜太尉揚州大都督鄒陽所謂偏聽生姦范睢所謂妒賢疾能史記鄒陽傳鄒陽者齊人也游於梁以讒見禽乃從獄中上書其略曰百里奚乞食於路繆公委之以政寧戚飯牛車下而桓公任之以國此二人者豈借宦於朝假譽於左右然後二主用之哉感於心合於行親於膠漆昆弟不能離豈惑於衆口哉故偏聽生姦獨任成亂范睢傳范睢者魏人也字叔相秦昭王號為應侯說秦昭王曰且夫三代所以亡國者君専授政縱酒馳騁弋獵不聽政事其所授者妒賢嫉能御下蔽上以成其私不為主計而主不悟故失其位國由基之射左傳成公十六年潘尫之黨黨潘尫之子尫烏黃反與養由基由基楚善射者蹲甲而射之蹲聚也徹七札焉以示王曰君有二臣如此何憂於戰司徒教民道藝而書居其一外史掌達書名於四方大行人之法每九歲而一諭周禮地官大司徒以鄉三物教萬民而賔興之三曰六藝禮樂射御書數五禮六樂五射五御六書九數春官外史猶今之外制即舍人之職也掌書外令掌四方之志掌三皇五帝之書掌達書名于四方若以書使使去聲于四方則書其令大行人主之所以撫邦國諸侯者歲遍存三歲遍俯音眺五歲遍省七歲屬象胥諭言語協辭命九歲屬瞽史諭書名書名所以同其文故使瞽史諭之聽聲音二者九年一次舉行中庸章句或問通證
