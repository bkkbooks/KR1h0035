body:
  text: 欽定四庫全書經部八四書通證總目四書類大學章句或問通證一卷論語集注通證二卷孟子集注通證二卷中庸章句或問通證一卷臣等謹案四書通證六卷元張存中撰存中字德庸新安人初胡炳文作四書通釋義理而略名物存中因排纂舊説成此書以附其後故名曰四書通證炳文為之序稱北方杜緱山有語孟旁通平水薛夀之有四書引證皆失之太繁且各有未完存中能刪冗從簡去非取是又曰學者於余之通知四書用意之深于通證知四書用事之審推之可謂至矣今核其書凡引經數典字字必著所出而夏曰瑚商曰璉承包氏之誤者乃置此一條不引禮記以證之蓋不免有所回護不知朱子之學在明聖道之正傳區區訓詁之間不足為之纍亦不必為之諱也又如三讓引吳越春秋泛及雜説而厯代史事乃置正史而引通鑑亦非根本之學然大概徴引詳明于人人習讀不察者一一具標出處可省檢閲之煩于學者亦不為無補也乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀四書通證原序北方杜緱山有語孟旁通平水薛夀之有四書引證皆失之太繁且其中各有未完處觀者病焉今友人張德庸精加讐校刪冗而從簡去非而從是又能完其所未完者合而名之曰四書通證以附余通之後學者於余之通知四書用意之深於通證知四書用事之審德庸此書誠有補云泰定戊辰正月壬辰雲峰老人胡炳文序欽定四庫全書四書通證凡例一四書集注明理用事簡明為尚至集成而理愈晦矣雲峰胡先生去其晦而取其明則理通矣今箋義出而事益繁矣存中不揆僭越去其繁而從其簡則事亦通矣此二書之所以作也一旁通杜氏以朱張語孟為之今只證朱子所引事者其餘皆不復出一引證薛氏所集與旁通同時如語孟所引者則一而薛氏訓詁太繁又引四書互證四書似此類皆不復出一標題四書熊氏以旁通增益而已凡旁通未有者今皆參考增附於此一四書箋義趙氏所輯與旁通標題相類而過於繁冗如集注本自明白者不必引可也今亦參考增附一凡四書通內已注釋者此不復出如大學序王宫有學及禮樂射御書數之類取熊氏標題及齊氏六藝説已明白矣其餘詳其所難知略其所易見如旁通引證有遺缺者輒紀一二然所引經子史集則一故不標係某人所紀慮其繁也一存中指摘先輩深懼不韙然不從簡俾初學之士夸多務靡玩物喪志至不為心身之求則無益矣校之旁通諸書此三之一爾然猶自以為繁惟同志之士是正幸甚四書通證羣書總目周易尚書毛詩周禮儀禮春秋大戴禮禮記爾雅左氏傳公羊傳穀梁傳尚書大傳韓詩外傳左傳注疏家語老子列子莊子楚辭荀子賈誼論策淮南子抱朴子揚子史記春秋國語吳越春秋戰國䇿兩漢書魏志蜀志南史唐書帝王通厯資治通鑑世説劉向説苑新序博雅黃帝素問杜少陵詩集韓昌黎文集周濓溪文集邵康節文集溫公潛虛易近思録正蒙書道學語録宋齊丘化書隂陽金匱書四書標題語孟旁通四書引證四書箋義欽定四庫全書大學章句或問通證元張存中撰章句序司徒之職典樂之官所由設也書舜典帝曰契百姓不親五品不遜汝作司徒敬敷五教在寬夔命汝典樂教胄子直而溫寬而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和夔曰於豫擊石拊石百獸率舞周禮地官司徒惟王建國辨方正位體國經野設官分職以為民極乃立地官司徒使帥其屬而掌邦教以佐王安擾邦國記誦詞章之習禮學記記問之學不足以為人師記問謂豫誦雜難雜説至講時為學者論之此或時師不心解或學者所未能問按近思録謝顯道云嘗録古人善行别作一册明道先生曰是玩物喪志胡安國云謝先生初以記問為學自負該博對明道舉史書成篇不遺一字明道曰賢却記得許多可謂玩物喪志謝聞此語汗流浹背及看明道讀史又却逐行看過謝甚不服後來省悟却將此事作話頭接引博學之士虛無寂滅之教通鑑漢驃騎將軍霍去病出隴西過焉音煙耆山得休屠王祭天金人顔師古曰今佛像是其遺法也初帝聞西域有神其名曰佛因遣蔡愔等之天竺求其道得書及沙門以來其書大抵以虛無為宗貴慈悲不殺以為人死不滅復受形生時所行善惡皆有報應故所貴修錬精神以至為佛傳十章楚書楚語國語楚語王孫圉聘於晉圉楚大夫也定公饗之趙簡子鳴玉以相趙鞅鳴其佩玉以相禮問於王孫圉曰楚之白珩猶在乎珩珮玉之橫者對曰然簡子曰其為寶也幾何矣曰未嘗為寶楚之為寶者曰觀射父言以賢為寶能作訓辭以行事於諸侯使無以寡君為口實又有左史倚相能道訓典以敘百物以朝夕獻善敗于寡君使寡君無忘先王之業又能上下説于鬼神順道其欲惡説媚也使神無有怨痛于楚國痛疾也又有藪曰雲夢連徒洲金木竹箭之所生也楚有雲夢藪澤名也連屬也徒洲洲名也龜珠角齒皮革羽毛所以備賦用以戒不虞者也龜所以備吉凶珠所以禦火災角所以為弓齒所以為弭皮虎豹皮也所以為茵鞬革犀兕也所以為甲胄羽烏羽也所以為旌毛氂牛尾也所以注竿首所以共幣帛以賔享於諸侯者也享獻也若諸侯之好幣具而導之以訓辭有不虞之備而皇神相之寡君其可以免罪於諸侯而國民保焉此楚國之寶也若夫白珩先王之玩也何寶之焉圉聞國之寶六而已明王聖人能議制百物以輔相國家則寶之玉足以庇蔭嘉穀使無水旱之災則寶之祭祀之玉龜足以憲臧否則寶之珠足以禦火災則寶之水精禦火災金足以禦兵亂則寶之山林藪澤足以備財用則寶之若夫譁囂之美楚雖蠻夷不能寶也譁囂刺簡子鳴玉以相也事見檀弓晉獻公之喪秦穆公使人弔公子重平聲耳獻公殺其世子申生重耳避難出奔是時在狄就弔之且曰寡人聞之亡國恆於斯得國恆於斯雖吾子嚴然在憂服之中喪亦不可久也時亦不可失也孺子其圗之嚴本作儼喪去聲以告舅犯舅犯重耳之舅狐偃也字子犯舅犯曰孺子其辭焉喪人無寶仁親以為寶父死之謂何又因以為利欲反國求為後是利父死而天下其孰能説之孺子其辭焉説猶解也公子重耳對客曰君惠弔亡臣重耳身喪父死不得與於哭泣之哀以為君憂與音預父死之謂何或敢有他志以辱君義稽顙而不拜哭而起起而不私他志謂私也子顯以致命於穆公穆公曰仁夫公子重耳夫稽顙而不拜則未為後也故不成拜哭而起則愛父也起而不私則逺利也喪祭用氷者也禮喪大記君設大盤造氷焉大夫設夷盤造氷焉士併瓦盤無氷設牀袒笫有枕含一牀襲一牀遷尸于堂又一牀皆有枕席君大夫士一也造猶納也袒笫袒簀也謂無席如浴時牀也禮自仲春之後尸既襲既小斂先納氷盤中乃設牀於其上不施席而遷尸焉秋涼而止士不用冰以瓦為盤併以盛水耳周禮天官凌人掌氷正歲十有二月令斬氷三其凌春始治鑑凡外內饔之膳羞鑑焉凡酒漿之酒醴亦如之祭祀共氷鑑賔客共氷凌氷室也鑑如甀大口以盛氷置食物酒醴于中以禦熱氣防變色失味也甀音縋今大瓦盆屬大喪共夷盤氷鄭氏曰夷之言尸也實氷于盤中置之尸牀之下所以寒尸尸之盤曰夷槃牀曰夷牀衾曰夷食移尸曰夷于堂皆依尸而為言或問經一章其所以固其肌膚之會筋骸之束禮禮運故禮義也者人之大端也所以講信修睦而固人肌膚之會筋骸之束也周子所謂無極之真二五之精妙合而凝者太極圗説無極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物萬物生生而變化無窮焉格者極至之謂如格于文祖之格書舜典弊車羸馬亦為人耳唐書循吏傳賈敦頤曹州人貞觀時數音朔厯州刺史資亷潔入朝常盡室行車一乘去聲敝甚羸馬繩羈羸瘦羈鞅以繩為之不用裝飾昭其儉也傳二章周武王踐祚之初受師尚父丹書之戒退而於其几席觴豆刀劍户牖莫不銘焉今其遺語尚幸頗見於禮書大戴禮武王踐祚篇武王踐祚三日踐猶登也祚位也人君登寶位謂之踐祚也召士大夫而問焉曰惡平聲有藏之約而行之萬世可以為子孫常者乎皆曰未得聞也然後召師尚父而問焉尚父大公望吕氏詳見孟子離婁上曰黃帝顓帝之道可得而見與平聲師尚父曰在丹書王欲聞之則齊側皆反下同矣王齊三日王端冕師尚父亦端冕奉書而入王東面而立尚父西面道書之言曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶凡事不強則枉弗敬則不正枉者滅廢敬者萬世王聞書之言惕若恐懼而為戒書於席四端為銘焉銘曰安樂必敬無行可悔一反一側亦不可不志殷監不逺視爾所代几銘曰皇皇惟敬口口生敬口生垢口戕口鑑銘曰見爾前慮爾後盤銘曰與其溺於人也寧溺於淵溺於淵猶可遊也溺於人不可救也楹銘曰毋曰胡殘其禍將然毋曰胡害其禍將大毋曰胡傷其禍將長杖銘曰於乎危亡於忿疐於乎失道於嗜欲於乎相忘於富貴於乎之於音烏帶銘曰火滅修容慎戒必共共並音恭則夀屨銘曰慎之勞勞則富觴豆銘曰食自杖食自杖戒之驕驕則逸户銘曰夫名難得而易失無勤弗志而曰我知之乎無勤弗及而曰我知之乎擾阻以泥之若風將至先搖搖雖有聖人不能為謀牖銘曰隨天之時以地之財敬祀皇天敬以先時劒銘曰帶之以為服動必行德行德則興倍德則崩弓銘曰屈申與伸同之義廢之行之無忘息過矛銘曰造矛造矛少間弗忍終身之羞余一人所聞以戒萬世子孫傳三章亦未必不為尾生白公之為也莊子盜跖篇尾生與女子期於梁下尾生一本作微生與女子相期約於橋梁之下女子不來水至不去抱梁柱而死又出抱朴子左傳哀公十六年楚太子建之遇讒也楚平王太子名建費無極為少師不得寵愛於太子故讒譖太子於平王自城父奔宋城父今襄城城父縣故使太子居之無極言於楚王曰建與伍奢將以方城之外叛自以為猶宋鄭也王信之使城父司馬奮揚殺太子末至奮揚知大子寃故遣令去太子建棄城父而出奔宋又辟華氏之亂於鄭宋華氏向氏為亂建辟而奔鄭鄭人甚善之又適晉與晉人謀襲鄭乃求復焉鄭人復之如初晉人使諜於子木子木即太子建晉人使諜伺之請行而期焉子木暴虐於其私邑邑人訴之鄭人省之得晉諜焉遂殺子木其子曰勝在吳子西欲召之楚令尹子西即公子申葉音攝公曰即葉公子髙沈諸梁也吾聞勝也詐而亂無乃害乎子西曰吾聞勝也信而勇不為不利舍諸邊竟音境使衛藩焉葉公曰周仁之謂信率義之謂勇吾聞勝也好復言言之所許必欲復行之不顧道理而求死士殆有私乎復言非信也期死非勇也子必悔之弗從召之使處吳竟為白公白楚邑楚邑宰皆僭稱公請伐鄭子西曰楚未節也言楚國新復政今猶未得節制不然吾不忘也他日又請許之未起師晉人伐鄭楚救之與之盟勝曰鄭人在此讎不逺矣勝自厲劔子期之子平見之曰王孫何自厲也曰勝以直聞不告女音汝庸為直乎將以殺爾父平以告子西子西曰勝如卵余翼而長之楚國第且楚國用士之次第我死令尹司馬非勝而誰勝聞之曰令尹之狂也得死乃非我子西不悛勝謂石乞石乞勝之徒黨曰王與二卿士皆五百人當之則可矣乞曰不可得也曰白公曰市南有熊宜僚者若得之可以當五百人矣乃從白公而見之與之言説告之故辭承之以劔不動勝曰不為去聲利諂不為威惕不泄人言以求媚者去之吳人伐慎白公敗之請以戰備獻白公請以與吳戰之所得鎧仗兵器皆出而獻之欲因以作亂許之遂作亂秋七月殺子西子期于朝而劫惠王傳五章所謂思曰睿睿作聖董子所謂強勉學問則聞見博而智益明書洪範二五事一曰貌二曰言三曰視四曰聽五曰思貌曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作乂明作哲聰作謀睿作聖思而作睿則無所不通而成聖西漢董仲舒傳廣川人也仲舒以賢良對策曰強上聲勉學問則聞見博而智益明強勉行道則德日起而大有功此皆可使還至而立有效者也文言所謂學聚問辨易乾卦君子學以聚之問以辨之寬以居之仁以行之學聚問辨進德事也寬居仁行居業事也劉子所謂天地之中劉子周頃王季子定王弟左傳成公十三年劉康公成肅公會晉侯伐秦劉成食采之邑名康肅皆諡成子受脤市軫反于社成子即成肅公脤宜社之肉也盛以脤器故曰脤不敬劉子曰吾聞之民受天地之中以生所謂命也是以有動作禮義威儀之則則法也以定命也能者養之以福不能者敗以取禍程子所謂天然自有之中近思録伊川曰凡物有本末不可分本末為兩段事灑掃應對是其然也必有所以然楊子拔一毛不為墨子又摩頂放踵為之此皆是不得中至如子莫執中欲執此二者之中不知怎麼執得識得則事事物物上皆天然有箇中在那上不待人安排也安排著則不中矣張子所謂萬物之一原正蒙書誠明篇性者萬物之一原非有我之得私也惟大人為能盡其道邵子所謂道之形體者文集性者道之形體也道妙而無形性則仁義禮智具而體著矣欲藏形匿景莊子漁父篇人有畏影惡去聲迹而去之走者舉足愈數音朔而迹愈多走愈疾而影不離身自以為尚遲疾走不休絶力而死不知處隂以休影處靜以息迹愚亦甚矣速貧速朽之論詳見滕文公上樂毅所謂慊於志史記列傳樂毅遺燕惠王書略曰毅先祖樂羊為魏文侯將後為靈夀人自五伯已來功未有及先王者也先王以為慊於志漢書所謂嗛栗姬西漢外戚傳景帝立齊栗姬男為太子而王夫人男為膠東王長公主嫖有女欲與太子為妃栗姬妬而景帝諸美人皆因長公主見得貴幸栗姬日怨謝長公主不許長公主欲與王夫人王夫人許之會薄皇后廢長公主日譖栗姬短景帝嘗屬諸姬子曰吾百歲後善視之栗姬怒不肯應言不遜景帝心銜之而未發也長公主日譽王夫人男之美帝亦自賢之又耳曩者夢日符計未有所定王夫人知嗛栗姬又隂使人趣大臣立栗姬為皇后大行奏事文曰子以母貴母以子貴今太子母號宜為皇后帝怒曰是乃所當言耶遂案誅大行而廢太子為臨江王栗姬愈恚於避反不得見以憂死卒立王夫人為皇后男為太子仰面貪看鳥回頭錯應人唐杜少陵漫成詩傳九章漢之光武亦賢君也一旦以無罪黜其妻云云後漢郅音質惲音藴傳惲字君章汝南西平人為太子侍講再遷長沙太守郭皇后廢后光武之后也諱聖通真定槖人以寵衰數懷怨懟上怒建武十七年十月廢為中山王太后立貴人隂氏為皇后詔曰異常之事非國休福不得上夀稱慶惲乃言於帝曰臣聞夫婦之好父不能得之於子况臣能得之於君乎是臣所不敢言雖然願陛下念其可否之計無令天下有議社稷而已帝曰惲善恕已量主知我必不有所左右而輕天下也所謂潔之百圍莊子人間世篇匠石之齊至于曲轅見櫟社樹其大蔽牛潔之百圍賈子所謂度長潔大過秦論賈子名誼洛陽人漢文帝時官至博士試使山東之國與陳涉度音鐸長潔大比權量力則不可同年而語矣趙由之為守則易尉而為尉則陵守史記酷吏傳周陽由者其父趙兼以淮南王舅兼厲王母弟也父侯周陽故因姓周陽氏由以宗家任為郎按與國家有外戚因屬比於宗室故曰宗家也事孝文及景帝景帝時由為郡守武帝即位吏治尚循謹甚然由居二千石中最為暴酷驕恣所愛者撓法活之所憎者曲法誅滅之所居郡必夷其豪為守視都尉如令為都尉必陵太守奪之治與汲黯俱為忮司馬安之文惡俱在二千石列同車未嘗敢均茵伏均等也茵車伏慿軾也由後為河東都尉時與其守勝屠公爭權相告言罪勝屠即申屠也勝屠公當抵罪義不受刑自殺而由棄市自寧成周陽由之後事益多民巧法大抵吏之治類多成由等矣傳十章王肅事上而好人佞已魏志王肅傳肅太和中拜散騎常侍肅朗之子字子雍東海郡人史評曰劉實以為肅方事上而好下佞已此一反也洪範八政食貨為先書洪範三八政一曰食謂務農重穀之政也二曰貨謂阜通貨財之政三曰祀四曰司空五曰司徒六曰司冦七曰賔八曰師後世頭會箕斂西漢陳餘傳秦為亂政外內騷動百姓罷音疲敝頭會箕斂以供軍費秦法吏到民家計人頭數出粟以箕斂之為軍需之資財匱力盡商紂以自焚而起巨橋鹿臺之財史記紂使師涓作新淫聲北里之舞靡靡之樂厚賦稅以實鹿臺之財而盈巨橋之粟益收狗馬竒物充仞宫室益廣沙丘苑臺多取野獸蜚鳥置其中慢於鬼神大最樂戲於沙丘徐廣曰最一作聚以酒為池縣肉為林為長夜之飲百姓怨望而諸侯有畔者周武王於是遂率諸侯伐紂紂亦發兵距之牧野甲子曰紂兵敗紂走入登鹿臺衣其寶玉衣赴火而死周武王遂斬紂頭縣之白旗書武成乃反商政政由舊釋箕子囚封比干墓式商容閭散鹿臺之財發巨橋之粟大賚于四海而萬姓悅服德宗以出走而豐瓊林大盈之積唐書陸贄傳贄字敬輿蘇州嘉興人事德宗官中書侍郎中書門下平章事贈兵部尚書諡曰宣始帝播遷府藏委棄帝德宗也諱適代宗長子朱泚反帝出走在外至是天下貢奉稍至乃於行在夾廡署瓊林大盈二庫别藏貢物贄諌以為瓊林大盈於古無傳今師旅方殷瘡痛呻吟之聲未息遽以珍貢私别庫恐羣下有所觖望不滿所望請悉出以賜有功給軍賞瓌怪纎麗無得以供帝悟即撤其署公儀子拔園葵去織婦史記列傳公儀休者魯博士也以髙第為魯相休即公儀子也食茹而美拔其園葵而棄之食其菜曰茹謂食祿者不得與下民爭利見其家織布好而疾出其家婦燔其機燔焚也云欲令農夫工女安所讎其貨乎讎售也董子因有與之齒者去其角傅之翼者兩其足之喻西漢董仲舒傳仲舒以賢良對策曰夫天亦有所分去聲豫上聲豫之齒者去其角言天生萬物賦豫有分定謂牛無上齒則有角其餘無角者則有上齒傅其翼者兩其足傅讀曰附附著也言鳥不四足是所受大者不得取小也古之所豫祿者不食於力不動於末末謂工商之業也是亦受大者不得取小與天同意者也猶有用桑𢎞羊孔僅宇文融楊慎矜陳京裴延齡之徒以敗其國桑𢎞羊洛陽賈人之子漢武帝時為治粟都尉領大農盡管天下鹽鐵作平凖之法令逺方各以其物如異時商賈所轉販者為賦而相灌輸置平凖于京師都受天下委輸大農諸官盡籠天下之貨物貴即賣之賤則買之欲使富商大賈無所牟大利又請令吏得入粟補官及罪人贖罪於是賜爵左庶長是時小旱上令官求雨卜式言曰縣官當食租衣稅而已今𢎞羊令吏坐市列肆販物求利烹𢎞羊乃雨後為御史大夫昭帝朝與燕王旦謀反坐誅并宗族悉誅之孔僅漢武帝朝為大農丞領鹽鐵事南陽大冶致生纍千金後為大農令同桑𢎞羊稍置均輸以通貨物白金稍賤民不寶用竟廢之於是禁郡國無鑄錢専令上林三官鑄錢令天下非三官錢不得行宇文融京兆萬年人隋平昌公弼裔孫辨給多詐唐玄宗朝為富平主簿由監察御史陳便宜請校天下籍取匿戶羡田佐用度玄宗除為覆田勸農使鉤檢帳符得偽勳亡丁甚衆擢兵部員外郎兼侍御史括正州縣丘畝招徠户口而分業之又兼租地安輯戶口使於是諸道收沒戶八十萬田亦稱是歲終羡錢數百萬緡帝悅引拜御史中丞廣置使額以侈上心百姓怨恐有司劾融交不逞作威福其息受賕饋狼藉乃貶融平樂尉歲餘司農發融在汴州給隱官息錢巨萬給事中馮紹烈深文推證詔流于嵓州道廣州惶恐而卒楊慎矜隋齊正暕曽孫唐玄宗朝為御史知雜事議輸物有汗傷責州縣償所直轉輕賫入京師自此天下調發始煩後拔御史中丞以蓄讖緯妖言賜死陳京字慶復陳宜都王叔明五世孫事唐德宗帝討李希烈財用闕京為給事中與戶部侍郎趙贊請稅民屋架籍賈人資力以率貸之內怨外忿後以事罷為祕書少監卒裴延齡河中河東人唐德宗朝為司農少卿領度支不善財計乃廣鉤距取宿姦老吏與謀以固帝幸因建言左藏天下歲入不資耗登不可校請列别舍以檢盈虛於是以天下宿負八萬緡析為負庫抽貫三百萬緡為賸庫樣物三十萬緡為季庫帛以素出以色入者為月庫帝皆可之然天下負皆窮人償入無期抽貫與給皆盡樣物與帛固有籍又請以京兆苗錢市草千萬俾民輸諸苑延齡資苛刻又劫于利専剝下附上肆騁譎怪時人側目屬疾卧第載度攴官物輸之家無敢言死人語以相安惟帝悼不已册贈太子太傅上柱國諡曰繆大學章句或問通證
