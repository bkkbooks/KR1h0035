body:
  text: 欽定四庫全書孟子集注通證卷上元張存中撰序説荀子極偏駁只一句性惡大本已失性惡篇人之性惡其善者偽也揚子雖少過然亦不識性更説甚道學行篇學者所以修性也視聽言貌思性所有也修身篇人之性也善惡混修其善則為善人修其惡則為惡人氣也者所適善惡之馬也歟韓子有言曰向無孟氏則皆服左祍而言侏離後漢南蠻傳昔髙辛氏時有畜狗其毛五采名曰槃瓠音護魏略曰髙辛氏有老婦居王室得耳疾桃之乃得物大如繭婦人盛瓠中覆之以槃俄頃化為犬其文五色因名槃瓠以女配槃瓠生子一十二人六男六女槃瓠死後因自相夫妻織績木皮染以草實好五色衣服製裁皆有尾形衣裳班闌語言侏離侏離蠻夷語言不分朗之聲也好入山壑不樂平曠其後滋蔓號曰蠻夷梁惠王上篇萬乘之國章天子畿內地方千里出車萬乘前漢刑法志殷周以兵定天下矣天下既定戢藏干戈教以文德而猶立司馬之官設六軍之衆司馬夏官卿掌邦政軍旅屬焉萬二千五百人為軍王則六軍也因井田而制軍賦地方一里為井井十為通通十為成成方十里成十為終終十為同同方百里同十為封封十為畿畿方千里一成九百頃一同九萬頃一畿九百萬頃有稅有賦稅以足食賦以足兵故四井為邑四邑為丘一丘之地十六井也計田一百四十四頃一井八家計一百二十八家一甸之地六十四井也計田五百七十六頃五百一十二家出士卒共七十五人則殷周之制不及七家給一兵也又兵車一乘有牛馬共十六計三十二家又出一馬或牛也丘十六井也有戎馬一匹牛三頭四邱為甸甸六十四井也有戎馬四匹兵車一乘牛十二頭甲士三人卒七十二人干戈備具是謂乘馬之法甲士在車上也一同百里提封萬井提舉也舉四封之內也除山川沈斥城池邑居園囿術路三千六百井沈斥水田舄鹵也術大道也川謂水之通流者也沈謂淵深水之下也斥鹹鹵之地定出賦六千四百井戎馬四百匹兵車百乘此卿大夫采地之大者也采官也因官食地故曰采地爾雅曰采竂官也是謂百乘之家一封三百一十六里提封十萬井定出賦六萬四千井戎馬四千匹兵車千乘此諸侯之大者也是謂千乘之國天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹兵車萬乘故稱萬乘之主戎馬車徒干戈素具河內凶章移民移粟荒政之所不廢也周禮司徒以荒政十有二聚萬民一曰散利二曰薄征三曰緩刑四曰弛力五曰舍禁六曰去幾七曰眚禮八曰殺哀九曰蕃樂十曰多昏十一曰索鬼神十二曰除盜賊山林川澤與民共之而有厲禁周禮地官司徒山虞掌山林之政令物為之厲而為之守禁仲冬斬陽木仲夏斬隂木或謂陽木生山南者隂木生山北者凡服耜斬季材以時入之季猶稚也服與耜宜用稚材尚柔韌也服牝服車之材令萬民時斬材有期日澤虞掌國澤之政令為之厲禁使其地之人守其材物以時入之於玉府頒其餘於萬民草木零落然後斧斤入焉禮王制獺祭魚然後虞人入澤梁豺祭獸然後田獵鳩化為鷹然後設罻羅草木零落然後入山林如孟春犧牲毋用牝之類也禮月令孟春之月命樂正入學習舞乃修祭典命祀山林川澤犧牲毋用牝禁止伐木毋覆巢毋殺孩蟲胎天飛鳥毋麛毋卵財成輔相之道以左右民易泰卦象曰寡人願安承教章謂之芻靈禮檀弓下孔子謂為明器者知喪道矣備物而不可用也哀哉死者而用生者之器也不殆於用殉乎哉其曰明器神明之也塗車芻靈自古有之明器之道也孔子謂為芻靈者善謂為俑者不仁不殆於用人乎哉俑木偶人也有面目機發似乎生人晉國天下莫強焉章惠王三十年齊擊魏破其軍虜太子申史記魏世家惠王三十年魏伐趙趙告急齊齊宣王用孫子計救趙擊魏魏遂大興師使龎涓將而令太子申為上將軍與齊人戰敗於馬陵正義虞喜志林云馬陵在濮州鄄城縣東北六十里有陵澗谷深峻可以置伏兵按龎涓敗即此地齊虜魏太子申殺將軍涓軍遂大破十七年秦取魏少去聲梁史記魏世家惠王十七年魏與秦戰元里秦取我少梁元里少梁皆魏地邑名後魏又數獻地於秦史記商君傳秦孝公使衛鞅將兵伐魏魏使公子卬音昂將而擊之軍既相距衛鞅遺魏將公子卬書曰吾始與公子歡今俱為兩國將不忍相攻可與公子面相見盟樂飲而罷兵以安秦魏魏公子卬以為然會盟已飲而衛鞅伏甲士襲虜公子卬因攻其軍盡破之以歸秦魏惠王恐使使割河西之地獻於秦以和而魏遂去安邑徙都大梁與楚將昭陽戰敗亡其七邑史記楚世家懷王六年楚使柱國昭陽將兵而攻魏破之於襄陵得邑八按史記魏襄王十二年楚敗我襄陵不言邑數楚懷六年得邑八與集注七邑不合未知孰是詩云他人有心豫忖度之章詩小雅巧言之篇奕奕寢廟君子作之秩秩大猷聖人莫之他人有心豫忖度之躍躍他歷反毚士咸反兔遇犬獲之梁惠王下篇王語暴以好樂章奏以咸英韶濩無補於治也前漢禮樂志昔黃帝作咸池顓頊作六莖帝嚳音酷作五英堯作大章舜作招讀作韶禹作夏湯作濩音護武王作武周公作勺讀作酌取也勺言能勺先祖之道也武言以功定天下也濩言救民也夏大承二帝也招繼堯也大章章之也五英英華茂也六莖及根莖也咸池備矣文王之囿方七十里章古者四時之田皆於農隙以講武事左傳隱公五年春公將如棠觀魚者臧僖伯諫曰凡物不足以講大事僖伯公子彄也大事祀與戎其材不足以備器用則君不舉焉君將納民於軌物者也故講事以度軌量謂之軌取材以章物采謂之物不軌不物謂之亂政亂政亟行所以敗也故春搜夏苗秋獮冬狩搜索擇取不孕者苗為苗除害也獮殺也以殺為名順秋氣也狩圍守也冬物畢成獲則取之無所擇也皆於農隙以講事也禮入國而問禁曲禮入竟而問禁入國而問俗入門而問諱交鄰國有道乎章文王事見詩大雅綿八章肆不殄田典反厥愠紆閫反亦不隕韻敏反厥問柞子洛反棫音域拔蒲具反矣行道兊吐外反矣混音昆夷駾徒對反矣維其喙吁貴反矣言太王雖不能殄絶昆夷之愠怒亦不隕墜已之聲問蓋雖聖賢不能必人之不怒已但不廢其自修之實耳然太王始至此岐下之時林木深阻人物鮮少至於其後生齒漸繁歸附日衆則木拔道通混夷畏之而奔突竄伏維其喙息而已言德盛而混夷自服也蓋已為文王之時矣勾踐越王事見國語史記國語吳語史記越王勾踐世家同云越王興師伐吳越王勾踐祝融之後芈姓吳王夫差太伯之後姬姓越王伐吳吳王聞之悉發精兵擊越敗之夫音扶椒夫椒在吳郡吳縣太湖中椒山是也越王乃以餘兵五千人保棲於會古外反稽會稽山名今在山隂南七里吳王追而圍之越王謂范蠡曰范蠡字少伯越之上將軍也以不聼子故至於此為之奈何蠡對曰持滿者與天定傾者與人節事者以地卑辭厚禮以遺之不許而身與之市正義卑作言辭厚遺珍寶不許平越王身往事之如市買貨易以利此是定傾危之計勾踐曰諾乃令大夫種行成於吳正義吳越春秋云大夫種姓文名種字和子禽荆平王時為宛令成者平也求於吳也膝行頓首曰君王亡臣勾踐使臣種敢告下執事勾踐請為臣妻為妾吳王將許之子胥言於吳王曰天以越賜吳勿許也種還以報勾踐勾踐欲殺妻子燔寶器觸戰以死種止勾踐曰夫吳太宰嚭貪可誘以利請間行言之間行猶微行於是勾踐乃以美女寶器令種間獻吳太宰嚭嚭受乃見大夫種於吳王種頓首言曰願大王赦勾踐之罪盡入其寶器不幸不赦勾踐將盡殺其妻子燔其寶器五千人觸戰必有當也嚭因説吳王曰越以服為臣若將赦之此國之利也吳王將許之子胥進諫曰今不滅越後必悔之勾踐賢君種蠡良臣若反國將為亂吳王弗聽卒赦越罷兵而歸密人侵阮徂共之衆詩皇矣帝謂文王無然畔援無然歆羡誕先登于岸密人不恭敢距大邦侵阮徂共音恭王赫斯怒爰整其旅以按音遏徂旅以篤于周祜以對于天下密密須氏也姞姓之國在今寧州阮國名在今涇州共阮國之地名今荆州共池是也此言文王征伐之始他無所畔援歆羡大能先造道之極因密人之不恭是以如此師行而糧食章君行師從左傳定公四年三月君以軍行祓社釁鼓師出先有事祓禱於社謂之宜社於是殺牲以血塗鼓鼙為釁鼓祝奉以從奉社主也於是乎出竟若嘉好之事謂朝會君行師從二千五百人卿行旅從五百人臣無事焉樂有五聲三曰角為民四曰徴為事禮樂記宫為君宫絃最大用八十一絲聲重而尊故為君商為臣商是金金為決斷臣事也絃用七十二絲次宫如臣次君者也角為民角觸也物觸地而出戴芒角也絃用六十四絲聲居宫羽之中比君為劣比物為優角屬木以其清濁中民之象者也徴為事徴屬夏夏時生長萬物皆成形體事亦有體故配事絃用五十四絲羽為物羽為水最清物之象故為物絃用四十絲五者不亂則無怗處占反懘之音矣一作惉懘曰士師不能治士章其屬有鄉士遂士之官周禮秋官司冦刑官之屬大司冦小司冦士師鄉士主六鄉獄遂士主六遂之獄者縣士距王城三百里四百里曰縣又士主縣之獄者齊人伐燕勝之章以伐燕為宣王事與史記諸書不同史記燕世家燕王噲用其相子之蘇代為齊使於燕以事激燕王以尊子之於是燕王大信子之鹿毛夀謂燕王不如以國讓相之子人之謂堯賢者以其讓天下於許由許由不受有讓天下之名而實不失天下今王以國讓於子之子之必不敢受是王與堯同行也燕王因屬國於子之子之南面行王事而噲老不聼政顧為臣國事皆決於子之三年國大亂百姓恫恐將軍市被與太子平謀將攻子之諸將為齊湣王曰因而赴之破燕必矣齊王因令人告燕太子太子因與市被圍公宫攻子之不克將軍市被及百姓反攻太子平市被死以徇因搆難數月死者數萬衆人恫恐百姓離亡孟子謂齊王曰今伐燕此文武之時不可失也王因令章子將五都之兵以因北地之衆以伐燕士卒不戰城門不閉燕君噲死齊大勝燕子之亡二年而燕人共立太子平是為燕昭王鄒與魯閧章書曰民惟邦本本固邦寧五子之歌其一曰皇祖有訓皇祖禹也民可近不可下民惟邦本本固邦寧滕文公問曰滕小國也章國君死社稷禮曲禮下國君去其國止之曰奈何去社稷也大夫曰奈何去宗廟也士曰奈何去墳墓也國君死社稷大夫死衆士死制效死勿去章傳所謂國滅君死之正也公羊傳襄公六年十有二月齊侯滅萊曷為不言萊君出奔國滅君死之正也明國當存不書殺萊君者舉滅國為重守正而俟死者義也禮禮運故國有患君死社稷謂之義大夫死宗廟謂之變變當為辨聲之誤也辨猶正也君守社稷臣衛君之宗廟者患謂見圍入也公孫丑上篇夫子當路於齊章文王九十七而崩禮文王世子文王謂武王曰女音汝下同何夢矣武王對曰夢帝與我九齡文王曰女以為何也武王曰西方有九國焉君王其終撫諸文王曰非也古者謂年齡齒亦齡也我百爾九十吾與爾三焉文王九十七乃終武王九十三而終我四十不動心章古者冠縮縫今也衡縫又曰棺束縮二衡三禮檀弓古者冠縮縫今也衡縫故喪冠之反吉非古也縮直衡橫也又天子之棺四重棺束縮二衡三祍每束一如齊侯襲莒之襲春秋襄公二十三年秋齊侯伐晉冬齊侯襲莒輕行掩其不偹曰襲因伐晉還襲莒輕遣政反春秋傳曰戰不正勝公羊傳僖公二十六年夏齊人伐我北鄙公子遂如楚乞師乞者何卑辭也曷為以外內同若辭重師也曷為重師師出不正反戰不正勝也不正者不期也反復也勝捷也市㕓而不征章或賦其市地之㕓而不征其貨禮王制古者公田藉而不稅市㕓而不稅關譏而不征林麓川澤以時入而不禁夫圭田無征或治之以市官之法而不賦其㕓周禮地官司徒司市掌市之治教政刑量度禁令司市市官以次序分地而經市以陳肆辨物而平市以政令禁物靡而均市以商賈音古阜貨而行布以量度成賈價同而徴儥音育以質劑即隋反結信而止訟爾雅劑齊也質劑謂兩書一札而别之也若今手書言保物要還矣以賈音古民禁偽而除詐以刑罰禁暴皮告反而去盜以泉府同貨而斂賖大市日昃同而市百族為主朝市朝時而市商賈為主夕市夕時而市販方萬反夫販婦為主周禮宅不毛者有里布地官司徒載師職凡宅不毛者有里布田不耕者出屋粟民無職事者出夫家之征鄭司農云宅不毛者謂不樹桑麻也里布者布參印書廣二寸長二丈以為幣貿易物詩云抱布貿絲抱此布也或曰布泉春秋傳曰買之百兩一布又㕓人職掌斂市之次布總布質布罰布㕓布又謂宅不毛者罰以一里二十五家之泉空田者罰以三家之稅粟以共吉凶二服及喪器也民雖有間無職事者猶出夫稅家稅也夫稅者百晦之稅家稅者出士徒車輦給繇役禹聞善言則拜章書曰禹拜昌言大禹謨益贊于禹曰帝初于歷山往于田日號泣于旻天于父母負罪引慝祗載見瞽叟夔夔齊栗瞽亦允若至諴感神矧兹有苖禹拜昌言曰俞舜之側微耕于歷山陶于河濵漁于雷澤史記五帝紀舜耕歷山漁雷澤陶河濵作什器於夀邱就時於負夏舜耕歷山歷山之人皆讓畔漁雷澤雷澤之人皆讓居陶河濵河濵器皆不苦窳一年而所居成聚二年成邑三年成都歷山在河東雷澤夏兖州今屬濟隂河濵濟隂定陶西南陶邱亭夀邱在魯東門之北負夏衛地窳病也公孫丑下篇天時不如地利章時日支干孤虛王相之屬也隂陽家金匱云得與無視孤虛謂樗蒲博奕以正時六甲旬孤上坐者勝虛上坐者負伍子胥曰凡逺行諸事不得往甲子旬孤在戌亥虛在辰巳甲戌旬孤在申酉虛在寅卯甲申旬孤在午未虛在子丑甲午旬孤在辰巳虛在戌亥甲辰旬孤在寅卯虛在申酉甲寅旬孤在子丑虛在午未溫公潛虛易行王者吉相者臧休者平囚者否死者凶孟子將朝王章禮曰父命呼唯而不諾又曰君命召在官不俟屨在外不俟車玉藻父命呼唯而不諾手執業則投之食在口則吐之走而不趨凡君召以三節二節以走一節以趨節以玉為之所以明信輔君命也君使使召臣有二節時有一節故合云三也急則持二緩則持一周禮曰鎮圭以徴守其餘未聞也漢使者擁節在官不俟屨在外不俟車孟子之平陸章邑有先君之廟曰都左傳莊公二十八年築郿非都也凡邑有宗廟先君之主曰都無曰邑邑曰築都曰城周禮四縣為都四井為邑然宗廟所在則雖邑曰都尊之也燕人畔章後二年燕人共立太子平為王見前以伐燕為宣王事下尹士聞之曰士誠小人也章於此見君子憂則違之之情易乾卦初九文言滕文公上篇滕定公薨章喪禮三日始食粥既葬乃疏食禮喪大記君之喪子大夫公子衆士皆三日不食子大夫公子衆士食粥納財朝一溢米莫音暮一溢米食之無算士疏食水飲食之無算夫人世婦諸妻皆疏食水飲食之無算納食用也財榖米也二十兩曰溢於粟米之法一溢為米一升二十四分升之一諸妻御妾也同言無算則是皆一溢米或粥或飯居喪困病不能頓食隨需則食故無算大夫之喪主人室老子姓皆食粥衆士疏食水飲妻妾疏食水飲室老其貴臣也衆士所謂衆臣士亦如之既葬主人疏食水飲不食萊果婦人亦如之君大夫士一也練而食菜果祥而食肉諸侯五月而葬未葬居倚廬於中門之外左傳隱公元年天子七月而葬同軌畢至言同軌以别四夷之國諸侯五月同盟至同在方嶽之盟大夫三月同位至士踰月外姻至踰月度月姻親也此言赴弔各以逺近為差因為葬節禮喪大記父母之喪居倚廬不塗寢苫枕凷非喪事不言周法兼用貢助周禮冬官考工下匠人為溝洫九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺為之洫方百里為同同間廣二尋深二仭謂之澮此畿內采地之制九夫為井井方一里九夫所治之田也畿內用貢法者鄉遂及公邑之吏旦夕從民事為其促之以公使不得恤其私邦國用助法者諸侯専一國之政為其貪暴稅民無藝周之畿內稅有輕重諸侯謂之徹者通其率以十一為正滕文公問為國章周制為十一分而取其一前漢食貨志理民之道地著為本地著謂安土故必建步立畝正其經界六尺為步步百為畝畝百為夫夫三為屋屋三為井井方一里是為九夫八家共之各受私田百畝公田十畝是為八百八十畝餘二十畝以為廬舍廬田中屋也春夏居之秋冬則去出入相友守望相助疾病相救民是以和睦而教化齊同力役生産可得而平也民受田上田夫百畝中田夫二百畝下田夫三百畝嵗耕種者為不易上田休一嵗者為一易中田休二嵗者為再易下田三嵗更耕之自爰其處爰於也更互也農民户人已受田其家衆男為餘夫亦以口受田如比比例也必寐反士工商家受田五口乃當農夫一人此謂平土可以為法者也若山林藪澤原陵淳鹵之地淳盡也舄鹵之田不生五榖各以肥磽多少為差有賦有稅稅謂公田什一及工商衡虞之入也賦謂訃口發財稅謂收其田入賦共車馬甲兵士徒之役充實府庫賜豫之用稅給郊社宗廟百神之祀天子奉飬百官祿食庶事之費民年二十受田六十歸田在野曰廬在邑曰里廬各在其田中而里聚居也五家為鄰五鄰為里四里為族五族為黨五黨為州五州為鄉鄉萬二千五百戶也鄰長位下士自此以上稍登一級至鄉而為卿也於里有序而鄉有庠序以明教庠則行禮而視化焉視讀為示八嵗入小學學六甲五方書計之事辨五方之名及書藝也始知室家長幼之節十五入大學學先聖禮樂而知朝廷君臣之禮其有秀異者移鄉學於庠序庠序之異者移國學於少學諸侯嵗貢少學之異者於天子學於大學命曰造士行同能偶則别之以射然後爵命焉民三年耕則餘一年之畜衣食足而知榮辱亷讓生而爭訟息故三載考績三考黜陟餘三年食進業曰登進上農工諸事業名曰登再登曰平餘六年食三登曰泰平二十十嵗餘九年食然後王德流洽禮樂成焉諸侯未踰年之稱也左傳僖公九年春宋桓公卒未葬而襄公會諸侯故曰子凡在喪王曰小童公侯曰子子者繼父之辭公侯位尊上連王者下絶伯子男春秋例凡公侯卒未越一年有王事而皆稱子也公羊傳九月晉侯詭諸卒冬晉里克殺其君之子奚齊此未踰年之君其言弒君之子奚齊何弒未踰年君之號也國中郊門之內鄉遂之地也周禮司徒鄉老六鄉地在逺郊之內則居四同鄭云百里內為六鄉外為六遂萬二千五百家為鄉六鄉七萬五千家也遂亦如之遂人遂人主六遂若司徒之於六鄉也六遂之地自逺郊以逹於畿中有公邑家邑小都大都焉遂謂王國百里外也田不井受但為溝洫大司徒遂人凡治野夫間有遂遂上有徑十夫有溝溝上有畛之忍反百夫有洫况域反洫上有塗千夫有澮澮古外反上有道萬夫有川川上有路以逹于畿有為神農之言者許行章史遷所謂農家者流也前漢藝文志農家者流蓋出於農稷之官播百榖勸耕桑以足衣食猶隂陽醫方稱黃帝之説也黃帝泰素二十篇六國時韓諸公子所作劉向别録云言隂陽五行以為黃帝之道故曰泰素書曰天敘有典敕我五典五惇哉此之謂也臯陶謨古者為師心喪三年若喪父而無服也禮檀弓上事親有隱而無犯隱謂不稱揚其過失也無犯不犯顔而諌論語曰事父母幾諌左去聲右就飬去聲無方左右謂扶持之方猶常也服勤至死致喪三年勤勞辱之事也致謂戚容稱其服也凡此以恩為制事君有犯而無隱既諫人有問其國政者可以語其得失若齊晏子為晉叔向之言左右就飬有方各有常職服勤至死方喪三年方喪資於事父凡此以義為制事師無犯無隱左右就飬無方服勤至死心喪三年心喪戚容如父而無服也凡此以恩義之間為制又曰孔子之喪門人疑所服子貢曰昔者夫子之喪顔淵若喪子而無服喪子路亦然請喪夫子若喪父而無服如檀弓所記子遊謂有若之言似夫子之類是也禮檀弓上有子問於曾子曰聞喪去聲下同於夫子乎喪謂仕失位也魯昭公孫於齊曰喪曰聞之矣喪欲速貧死欲速朽有子曰是非君子之言也曾子曰參也聞諸夫子也有子又曰是非君子之言也曾子曰參也與子遊聞之有子曰然然則夫子有為去聲言之也曾子以斯言告於子遊子遊曰甚哉有子之言似夫子也昔者夫子居於宋見桓司馬自為石槨三年而不成桓司馬宋向戌之孫名魋夫子曰若是其靡也死不如速朽之愈也死之欲速朽為桓司馬言之也南宫敬叔反必載寶而朝敬叔魯孟僖子之子仲孫閲蓋嘗失位去魯得反載其寶來朝於君夫子曰若是其貨也喪不如速貧之愈也喪之欲速貧為敬叔言之也曾子以子遊之言告於有子有子曰然吾固知非夫子之言也曾子曰子何以知之有子曰夫子制於中都四寸之棺五寸之椁以斯知不欲速朽也中都魯邑名也孔子嘗為之宰為民作制孔子由中都宰為司空由司空為司寇昔者夫子失魯司寇將之荆將應聘於楚蓋先之以子夏又申之以冉有以斯知不欲速貧也言汲汲於仕得祿墨者夷之章莊子曰墨子生不歌死無服桐棺三寸而無椁天下篇古之喪禮貴賤有儀上下有等天子棺椁七重諸侯五重大夫三重士再重今墨子獨生不歌死無服桐棺三寸而無椁以為法式滕文公下篇古之君子仕乎章如士則執雉也周禮春官大宗伯以禽作六摯以等諸侯摯之為言至也所執以自致也亦作贄孤執皮帛卿執羔大夫執雁士執雉庶人執鶩音木工商執雞皮帛者束帛而表以皮為之飾皮虎豹皮帛如今璧色繒也羔小羊取其羣而不失其類雁取其候時而行雉取其守介而死不失其節鶩取其不飛遷雞取其守時而動諸侯為藉百畝禮祭義昔者天子為藉千畝冕而朱紘躬秉耒諸侯為藉百畝冕而青紘躬秉耒以事天地山川社稷先古以為醴酪齊音咨盛於是乎取之敬之至也藉藉田也而庶人助以終畝周禮天官甸師掌帥其屬而耕耨王藉以時入之以共齊盛王以孟春躬耕帝藉天子三推三公五推諸侯九推庶人終於畝庶人謂徒三百人藉之言借也王一耕之而使庶人耘耔終之齊盛祭祀所用榖也粢稷也榖以稷為長在器曰盛收而藏之御廩榖梁傳桓公十四年天子親耕以共粢盛王后親蠶以供祭服甸粟而內三宫三宫米而藏之御廩甸甸師掌田之官也三宫三夫人也宗廟之禮君親割夫人親舂未嘗必有兼甸之事焉夫人親舂是兼甸之事使世婦蠶于公桑蠶室禮祭義古者天子諸侯必有公桑蠶室近川而為之築宫仭有三尺棘牆而外閉之及大昕之朝君皮辨素積卜三宫之夫人世婦之吉者使入蠶于蠶室奉種浴于川桑于公桑風戾以食之大昕季春朔日之朝也諸侯夫人三宫半王后也風戾之者及早涼脆採之風戾之使露氣燥乃以食蠶蠶性惡濕嵗既單矣世婦卒蠶奉繭以示于君遂獻繭于夫人夫人曰此所以為君服與遂副禕音揮而受之因少牢以禮之嵗單謂三月月盡之後也言嵗者蠶嵗之大功事畢於此也副禕王后之服古之獻繭者其率用此與及良日夫人繅三盆手遂布于三宫夫人世婦之吉者使繅遂朱緣之玄黃之以為黼黻文章服既成君服以祀先王先公敬之至也三盆手者三淹也凡繅每淹大總而手振之以出緒也士有田則祭禮王制天子社稷皆大牢諸侯社稷皆少牢大夫士宗廟之祭有田則祭無田則薦庶人春薦韭夏薦麥秋薦黍冬薦稻宋小國也章宋王偃嘗滅滕伐薛敗齊楚魏之兵史記宋世家剔成弟偃攻襲剔成剔成敗奔齊偃自立為宋君偃十一年自立為王東敗齊取五城南敗楚取地三百里西敗魏軍乃與齊魏為敵國盛血以韋囊懸而射之命曰射天淫於酒婦人羣臣諫者輒射之於是諸侯皆曰桀宋宋其復為紂所為不可不誅告齊伐宋王偃四十七年齊湣王與魏楚伐宋殺王偃遂滅宋而三分其地離婁上篇離婁之明章六律截竹為筒隂陽各六前漢律歷志曰十二律黃帝之所作也黃帝使泠淪自大夏之西昆命之隂取竹之解谷生其竅厚均者大夏西戎之國昆侖谷名斷兩節間而吹之以為黃鍾之宫制十二筒音同以聽鳯之鳴其雄鳴為六雌鳴亦六比黃鍾之宫而皆可以生之是為律本此合也律十有二陽六為律隂六為吕律以統氣類物一曰黃鍾二曰太族七豆反三曰姑洗四曰㽔賔五曰夷則六曰亡射上音無下音亦吕以旅陽宣氣一曰林鍾二曰南吕三曰應鍾四曰大吕五曰夾鍾六曰中吕中讀曰仲有三統之義焉梁武帝終日一食蔬素宗廟以麵為犧牲通鑑梁武帝天監十六年詔以宗廟用牲牢有纍冥道宜皆以麵為之於是朝野喧譁以為宗廟去牲乃是不復血食帝竟不從八坐乃議以大脯代一元大武十月詔以宗廟猶用脯修更議代之於是以大餅代大脯其餘盡用蔬果自天監中用釋氏法長齋斷魚肉日止一食惟菜羮糲飯而已或遇事繁日移中則嗽口以過身衣布衫木綿皂帳一冠三載一衾二年後宫貴妃以下衣不曵地為政不難章麥丘邑人祝齊桓公曰願主君無得罪於羣臣百姓劉向新序雜事篇桓公田至於麥丘麥丘齊地桓公齊君名小白田獲也公獲於麥丘之地見麥丘邑人問之子何為者也對曰麥丘邑人也公曰年幾何對曰八十有三矣公曰美哉壽乎子其以子壽祝寡人麥丘邑人祝曰主君使主君甚壽金玉是賤人為寶桓公曰善哉至德不孤善言必再吾子復之麥丘邑人曰祝主君使主君無羞學無惡下問賢者在傍諫者得人桓公曰善哉至德不孤善言必三吾子復之麥丘邑人曰祝主君使主君無得罪於羣臣百姓桓公怫欎也音佛然作色曰吾聞之子得罪於父臣得罪於君未嘗聞君得罪於臣者也此一言者非夫二言者之匹也子更平聲之麥丘邑人坐拜而起曰此一言者夫二言之長也子得罪於父可以因姑姐妹叔父而解之父能赦之臣得罪於君可以因便嬖左右而謝之君能赦之昔桀得罪於湯紂得罪於武王此則君之得罪於臣也昔者夏桀商紂之為君行無道成湯放桀於南巢武王殺紂以滅其國此二君是得罪於臣者也莫為謝至今得罪公曰善賴國家之福社稷之靈使寡人得吾子於此扶而載之自御以歸禮之於朝封之以麥丘而斷政焉裴度所謂韓𢎞輿疾討賊承宗斂手削地唐書皇甫鎛音博傳鎛涇州臨涇人以中郎纍遷司農卿判度支改户部侍郎憲宗方伐蔡急於用度鎛裒會嚴亟以辦濟師帝恱進兼御史大夫蔡平之明年遂拜同中書門下平章事猶領度支鎛以吏道進既由聚斂句剝為宰相至雖市道皆嗤之崔羣裴度以聞帝怒不聽度乃表罷政事極語鎛姦邪苛刻天下怨之將食其肉且言天下安否繫朝廷朝廷輕重在輔相今承宗斂手削地承宗邊鎮王士真之子拒命以常山叛朝廷厭兵布衣柏耆杖䇿詣淮西行營謁裴度且言願得天子一節馳入鎮可掉舌下之度為言乃以左拾遺往既至以大誼動承宗泣下乃與獻德棣二州以二子入質上從之韓𢎞輿疾討賊𢎞滑州匡城人憲宗方用兵淮西拜淮西諸軍行營都統司扞兩河而令李光顔烏重胤擊賊𢎞不親屯遣子公武領兵三千屬光顔吳元濟既平以功加兼侍中封許國公李師道誅𢎞大懼因請入朝再拜司徒中書令以足疾命中人掖拜固願留京師帝從之非力能制之顧朝廷處置能服其心也若相鎛則四方解矣請授以浙西觀察使其辭切至上不聽天下有道章猶所謂難為兄難為弟云爾世説德行篇後漢陳元方子長文有英才元方名紀其子長文名羣與季方子孝先季方名諶紀之長弟也子孝先名忠各論父功德爭之不能決咨於太丘太丘名實字仲弓穎川人嘗除太丘長故曰太丘乃羣忠柤父也太丘曰元方難其兄季方難其弟言元方難為季方之兄季方難為元方之弟言二子俱有賢德桀紂之失天下也章朝錯所謂人情莫不欲壽西漢朝錯音厝傳錯頴川人錯賢良䇿對文帝曰愚臣竊以古之三王明之臣聞三王臣主俱賢故合謀相輔計安天下莫不本於人情人情莫不欲壽三王生而不傷也人情莫不欲富三王厚而不困也人情莫不欲安三王扶而不危也人情莫不欲逸三王節其力而不盡也伯夷辟紂章太公薑姓吕氏名尚史記齊世家太公望吕尚者東海人吕氏春秋曰東夷之士其先祖嘗為四嶽佐禹平水土甚有功虞夏之際封於吕吕在南陽宛縣西或封於申姓薑氏夏商之時申吕或封枝庶子孫或為庶人尚其後苖裔也本姓薑氏從其封姓故曰吕尚西伯出獵遇於渭之陽曰自吾先君太公望子久矣故號之曰太公望蕭何所謂飬民致賢以圖天下者暗與此合通鑑漢髙帝元年二月項羽立沛公為漢王王巴蜀漢中都南鄭而三人分關中王秦降將章邯等三人以距漢路漢王怒欲攻項羽周勃灌嬰樊噲皆勸之蕭何諫曰雖王漢中之惡不猶愈於死乎能詘與屈同於一人之下而信伸同於萬乘之上者湯武是也臣願大王王漢中飬其民以致賢人收用巴蜀還定三秦天下可圖也辟草萊任土地者次之章如李悝音恢盡地力前漢食貨志陵夷至於戰國貴詐力而賤仁義先富有而後禮讓是時李悝為魏文侯作盡地力之教以為地方百里提封九萬頃除山澤邑居參分去一為田六百萬畝治勤謹則畝益三升服虔曰與之三升也臣瓉曰當言三斗謂治田勤則畝加三斗也師古曰計數而言字當為斗瓉説是也不勤則損亦如之地方百里之增減輒為粟百八十萬石矣又曰糴甚貴傷民謂士工商也甚賤傷農民傷則離散農傷則國貧故甚貴與甚賤其傷一也善為國者使民無傷而農益勸今一夫挾五口治田百畝嵗收畝一石半為粟百五十石除十一之稅十五石餘百三十五石食人月一石半五人終嵗為粟九十石餘有四十五石石三十為錢千三百五十除社閭嘗新春秋之祠用錢三百餘千五十衣人率用錢三百五人終嵗用千五百不足四百五十不幸疾病死喪之費及上賦斂又未與此此農夫所以常困有不勸耕之心而令糴至於甚貴者也商鞅開阡陌之類也通鑑周顯王一十九年秦孝公十二年也秦商鞅築冀闕宫庭於咸陽徙都之令民父子兄弟同室內息者為禁并諸小鄉聚集為一縣縣置令丞凡三十一縣廢井田開阡陌路南北曰阡東西曰陌劉伯莊云開田界道使不相干平斗甬權衡丈尺男女授受不親章古禮男女不親授受內則男不言內女不言外非祭非喪不相授器其相授則女授以篚其無篚則皆坐奠之而後取之人不足與適也章書曰格其非心冏命匡其不及繩愆紏繆格其非心俾克紹先烈昔者孟子三見齊王而不言事荀子大略篇孟子三見齊王而不言事門人曰曷為三遇齊王而不言事孟子曰我先攻其邪心天下大恱章書所謂不格姦亦允若是也堯典克諧以孝蒸蒸乂不格姦大禹謨祗載見瞽叟夔夔齊栗瞽亦允若孟子集注通證卷上
